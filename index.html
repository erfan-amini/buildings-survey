// ─── Robust fetch helper: throws on non-OK responses ───
async function postJson(payload) {
  const r = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload),
  });
  if (!r.ok) {
    const text = await r.text().catch(() => "");
    throw new Error(`HTTP ${r.status}: ${text.slice(0, 200)}`);
  }
  const ct = r.headers.get("content-type") || "";
  return ct.includes("application/json") ? r.json() : r.text();
}

async function fetchSurveys(location) {
  try {
    const r = await fetch(API_URL + "?location=" + encodeURIComponent(location || "shinnecock"));
    if (!r.ok) {
      const text = await r.text().catch(() => "");
      throw new Error(`HTTP ${r.status}: ${text.slice(0, 200)}`);
    }
    const raw = await r.json();
    if (raw.error) throw new Error(raw.error);
    // Map Google Sheet column names to form field names
    const mapped = {};
    for (const uid in raw) {
      const s = raw[uid];
      mapped[uid] = {
        occType: s.occupancy_type || s.occType || "",
        buildingType: s.building_type || s.buildingType || "",
        numStories: String(s.number_of_stories || s.numStories || ""),
        area: String(s.area || ""),
        foundationType: s.foundation_type || s.foundationType || "",
        firstFloorHeight: String(s.foundation_height || s.firstFloorHeight || ""),
        yearBuilt: String(s.year_built || s.yearBuilt || ""),
        groundElev: String(s.ground_elevation || s.groundElev || ""),
        address: s.address || "",
        structureValue: String(s.structure_value || s.structureValue || ""),
        contentValue: String(s.content_value || s.contentValue || ""),
        basement: s.basement || "",
        notes: s.notes || "",
        surveyor: s.surveyor || "",
        savedAt: s.savedAt || "",
        flagged: (() => { const v = String(s.flagged || "").trim(); if (/^demolished$/i.test(v)) return "Demolished"; if (/^(yes|true|1)$/i.test(v)) return "Yes"; return ""; })(),
        longitude: s.longitude || "",
        latitude: s.latitude || "",
        survey_type: s.survey_type || "",
        ID: s.ID || "",
      };
    }
    return { data: mapped, error: null };
  } catch(e) {
    console.error("Fetch surveys failed:", e);
    return { data: {}, error: e.message };
  }
}

  } catch (err) {

// ─── Microsoft Building Footprints (ArcGIS) ───
const MSBFP_URL = "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/MSBFP2/FeatureServer/0/query";

async function fetchBuildingFootprintArea(lng, lat) {
  const params = new URLSearchParams({
    geometry: `${lng},${lat}`,
    geometryType: "esriGeometryPoint",
    spatialRel: "esriSpatialRelIntersects",
    returnGeometry: "true",
    outFields: "*",
    inSR: "4326",
    outSR: "4326",
    f: "json",
  });
  const r = await fetch(`${MSBFP_URL}?${params}`);
  if (!r.ok) throw new Error(`ArcGIS HTTP ${r.status}`);
  const data = await r.json();
  if (!data.features || data.features.length === 0) return null;

  // Compute area for each matching polygon, pick the smallest (most specific building)
  function calcRingsArea(rings) {
    let totalSqM = 0;
    for (let ri = 0; ri < rings.length; ri++) {
      const ring = rings[ri];
      const midLat = ring.reduce((s, p) => s + p[1], 0) / ring.length;
      const degLng2m = Math.cos(midLat * Math.PI / 180) * 111320;
      const degLat2m = 110540;
      let area = 0;
      for (let i = 0; i < ring.length; i++) {
        const j = (i + 1) % ring.length;
        const xi = ring[i][0] * degLng2m, yi = ring[i][1] * degLat2m;
        const xj = ring[j][0] * degLng2m, yj = ring[j][1] * degLat2m;
        area += xi * yj - xj * yi;
      }
      const signedArea = area / 2;
      totalSqM += (ri === 0) ? Math.abs(signedArea) : -Math.abs(signedArea);
    }
    return Math.max(0, totalSqM);
  }

  let bestSqM = Infinity;
  for (const feat of data.features) {
    const rings = feat.geometry && feat.geometry.rings;
    if (!rings || rings.length === 0) continue;
    const sqm = calcRingsArea(rings);
    if (sqm > 0 && sqm < bestSqM) bestSqM = sqm;
  }
  if (!isFinite(bestSqM) || bestSqM <= 0) return null;
  return Math.round(bestSqM * 10.7639);
}

// ─── USGS 3DEP Elevation Point Query (NAVD88, 1m lidar where available) ───
const USGS_EPQS_URL = "https://epqs.nationalmap.gov/v1/json";

async function fetchUSGSElevation(lng, lat) {
  const params = new URLSearchParams({
    x: String(lng),
    y: String(lat),
    wkid: "4326",
    units: "Feet",
    includeDate: "false",
  });
  const r = await fetch(`${USGS_EPQS_URL}?${params}`);
  if (!r.ok) throw new Error(`USGS HTTP ${r.status}`);
  const data = await r.json();
  // EPQS v1 returns { value: <number> } or { value: -1000000 } for ocean/void
  const elev = parseFloat(data.value);
  if (!isFinite(elev) || elev < -1000) return null;
  return Math.round(elev * 100) / 100; // 2 decimal places, in feet NAVD88
}

// ─── Cost Estimator (OLS regression on local building stock) ───
// Uses all buildings in the current location with known gross area and
// structure value to fit: structureValue = slope × grossArea + intercept
// Then predicts for the target building. Content = structure / 2.
// Minimum 5 reference points required; falls back to median $/sqft otherwise.

function estimateCostRegression(footprintArea, stories, allSurveys, allBuildings, occType) {
  const fp = parseFloat(footprintArea) || 0;
  const s = Math.max(1, Math.round(parseFloat(stories) || 1));
  const grossTarget = fp * s;
  if (grossTarget <= 0) return null;

  // Collect reference data: buildings with known area, stories, and structure value
  const collectRefs = (filter) => {
    const refs = [];
    allBuildings.forEach(b => {
      const sv = allSurveys[b.uid];
      const pf = b.prefill || {};
      const d = sv || pf;
      if (filter && !(d.occType || pf.occType || "").toUpperCase().startsWith(filter)) return;
      const area = parseFloat(d.area || pf.area);
      const st = parseFloat(d.numStories || pf.numStories);
      const val = parseFloat(d.structureValue || pf.structureValue);
      if (isFinite(area) && area > 0 && isFinite(st) && st >= 1 && isFinite(val) && val > 0) {
        refs.push({ gross: area * Math.round(st), val });
      }
    });
    return refs;
  };

  // Try same occupancy prefix first (e.g., "RES", "COM"), fall back to all
  const occPrefix = (occType || "").toUpperCase().replace(/[0-9].*/,"");
  let refs = occPrefix ? collectRefs(occPrefix) : [];
  const usedFilter = refs.length >= 3;
  if (refs.length < 3) refs = collectRefs(null);
  if (refs.length < 2) return null;

  // Proper statistical median
  function median(arr) {
    const sorted = [...arr].sort((a,b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    return sorted.length % 2 === 0 ? (sorted[mid-1] + sorted[mid]) / 2 : sorted[mid];
  }

  // OLS: y = slope * x + intercept
  const n = refs.length;
  let sx = 0, sy = 0, sxy = 0, sxx = 0;
  for (const r of refs) { sx += r.gross; sy += r.val; sxy += r.gross * r.val; sxx += r.gross * r.gross; }
  const denom = n * sxx - sx * sx;

  let sv, method;
  if (Math.abs(denom) < 1e-10 || n < 5) {
    const medPsf = median(refs.map(r => r.val / r.gross));
    sv = Math.round(grossTarget * medPsf);
    method = "median";
  } else {
    const slope = (n * sxy - sx * sy) / denom;
    const intercept = (sy - slope * sx) / n;
    sv = Math.round(slope * grossTarget + intercept);
    method = "OLS";
    if (sv < grossTarget * 10) {
      const medPsf = median(refs.map(r => r.val / r.gross));
      sv = Math.round(grossTarget * medPsf);
      method = "median";
    }
  }

  return { structure: sv, content: Math.round(sv / 2), refCount: n, method, filtered: usedFilter, occPrefix };
}

function applyDevEdits(base, edits) {
  let list = base.filter(b => !edits.removed.includes(b.uid));
  list = list.map(b => {
    if (edits.moved[b.uid]) return { ...b, lat: edits.moved[b.uid].lat, lng: edits.moved[b.uid].lng };
    return b;
  });
  // Add dev-added points, skipping any that already exist in base (from sheet row auto-creation)
  const baseUids = new Set(list.map(b => b.uid));
  edits.added.forEach(a => {
    if (baseUids.has(a.uid)) return; // already in sheet, skip duplicate
    // Apply moved coordinates to added points too
    if (edits.moved[a.uid]) {
      list.push({ ...a, lat: edits.moved[a.uid].lat, lng: edits.moved[a.uid].lng });
    } else {
      list.push(a);
    }
  });
  return list;
}

// Shared helper: build buildings array from sheet data, skipping invalid coords
function sheetDataToBuildings(sheetData) {
  return Object.entries(sheetData)
    .map(([uid, s]) => {
      const lng = parseFloat(s.longitude);
      const lat = parseFloat(s.latitude);
      if (!isFinite(lng) || !isFinite(lat) || (lng === 0 && lat === 0)) return null;
      return {
        uid,
        type: s.survey_type || (uid.startsWith("nsi-") ? "verify" : "survey"),
        nsiId: s.ID || "",
        lng, lat,
        prefill: {
          occType: s.occType || "", buildingType: s.buildingType || "",
          numStories: s.numStories || "", area: s.area || "",
          foundationType: s.foundationType || "", firstFloorHeight: s.firstFloorHeight || "",
          yearBuilt: s.yearBuilt || "", groundElev: s.groundElev || "",
          address: s.address || "",
          structureValue: s.structureValue || "", contentValue: s.contentValue || "",
          basement: s.basement || "", notes: s.notes || "", surveyor: s.surveyor || "",
          flagged: s.flagged || "",
        },
      };
    })
    .filter(Boolean);
}

// Shared helper: load and merge dev edits from local + remote
async function loadDevEdits(location) {
  let best = { removed: [], moved: {}, added: [], _ts: 0 };
  // Check localStorage
  try {
    const raw = localStorage.getItem("nsi-dev-edits-" + location);
    if (raw) {
      const local = JSON.parse(raw);
      if (!local.removed) local.removed = [];
      if (!local.moved) local.moved = {};
      if (!local.added) local.added = [];
      if (!local._ts) local._ts = 1;
      best = local;
    }
  } catch {}
  // Check remote
  try {
    const remote = await fetchDevEdits(location);
    if (remote) {
      if (!remote.removed) remote.removed = [];
      if (!remote.moved) remote.moved = {};
      if (!remote.added) remote.added = [];
      if (!remote._ts) remote._ts = 0;
      if (remote._ts > best._ts) best = remote;
    }
  } catch {}
  return best;
}

function App() {
  const mapRef = useRef(null);
  const mapInst = useRef(null);
  const markersRef = useRef({});
  const flagMarkersRef = useRef({});

  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const mrkR = isMobile ? 10 : 7;
  const mrkRv = isMobile ? 9 : 6;
  const mrkRsel = isMobile ? 14 : 10;

  const [curLoc, setCurLoc] = useState("masticbeach");
  const curLocRef = useRef(curLoc);

  const switchLocation = useCallback(async (newLoc) => {
    if (newLoc === curLocRef.current) return;
    curLocRef.current = newLoc;
    setCurLoc(newLoc);
    setSelected(null);
    setForm(EMPTY_FORM);
    setLoading(true);
    setDevAction(null);

    try {
      const result = await fetchSurveys(newLoc);
      const sheetData = (!result.error && result.data) ? result.data : {};
      const sheetBuildings = sheetDataToBuildings(sheetData);
      baseBuildingsRef.current = sheetBuildings;
      setSurveys(sheetData);

      // Always restore dev edits (may have added points even if sheet is empty)
      const best = await loadDevEdits(newLoc);
      devEditsRef.current = best;
      setDevEdits(best);
      setBuildings(applyDevEdits(sheetBuildings, best));
      saveLocalDev(best);
    } catch {
      baseBuildingsRef.current = [];
      setSurveys({});
      // Still try to load dev edits (may have added points)
      try {
        const best = await loadDevEdits(newLoc);
        devEditsRef.current = best;
        setDevEdits(best);
        setBuildings(applyDevEdits([], best));
        saveLocalDev(best);
      } catch { setBuildings([]); }
    }

    // Move map
    const loc = LOCATIONS[newLoc];
    if (mapInst.current) mapInst.current.setView(loc.center, loc.zoom, { animate: true });

    setLoading(false);
  }, []);

  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState(EMPTY_FORM);
  const [surveys, setSurveys] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [filter, setFilter] = useState("all");
  const [advFilters, setAdvFilters] = useState({ flagged: "all", occClass: "all", foundation: "all", bldgType: "all" });
  const [devAction, setDevAction] = useState(null); // "move" | "add" | null
  const [devEdits, setDevEdits] = useState({ removed: [], moved: {}, added: [] });
  const [devDirty, setDevDirty] = useState(false);
  const [devSyncing, setDevSyncing] = useState(false);
  const [buildings, setBuildings] = useState([]);
  const baseBuildingsRef = useRef([]);
  const devEditsRef = useRef(devEdits);
  const debounceTimerRef = useRef(null);

  // Helper: update ref + state + buildings + localStorage synchronously, then auto-save to server
  const commitDevEdits = useCallback((next) => {
    // Add timestamp for conflict resolution
    next._ts = Date.now();
    devEditsRef.current = next;
    setDevEdits(next);
    setBuildings(applyDevEdits(baseBuildingsRef.current, next));
    saveLocalDev(next);
    setDevDirty(true);
    // Auto-save to server with 3s debounce
    if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
    debounceTimerRef.current = setTimeout(async () => {
      savingRef.current = true;
      try {
        const cur = devEditsRef.current;
        const curBuildings = applyDevEdits(baseBuildingsRef.current, cur);
        await saveDevEditsRemote(cur, curLocRef.current);
        // Delete removed survey rows
        for (const uid of (cur.removed||[])) {
          await deleteSurveyEntry(uid, curLocRef.current);
        }
        // Update moved points' coordinates
        for (const uid in (cur.moved||{})) {
          const b = curBuildings.find(x => x.uid === uid);
          if (!b) continue;
          const s = surveysRef.current[uid] || (b.prefill ? {...b.prefill} : null);
          if (s) {
            await saveSurveyEntry(uid, b.type, b.nsiId, b.lng, b.lat, {...s, savedAt: s.savedAt || ""}, curLocRef.current);
          }
        }
        setDevDirty(false);
      } catch (err) {
        console.error("Dev auto-save failed:", err);
        if (typeof window.__showToast === "function") window.__showToast("Dev sync failed: " + err.message, "error");
      } finally {
        savingRef.current = false;
      }
    }, 3000);
  }, []);

  // Warn before leaving with unsaved dev edits
  useEffect(() => {
    const handler = (e) => {
      if (devDirty) { e.preventDefault(); e.returnValue = ""; }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [devDirty]);

  // Listen for localStorage changes from other tabs
  useEffect(() => {
    const handler = (e) => {
      if (e.key === ("nsi-dev-edits-" + curLocRef.current) && e.newValue) {
        try {
          const other = JSON.parse(e.newValue);
          const mine = devEditsRef.current;
          // Only accept if newer timestamp
          if ((other._ts || 0) > (mine._ts || 0)) {
            devEditsRef.current = other;
            setDevEdits(other);
            setBuildings(applyDevEdits(baseBuildingsRef.current, other));
          }
        } catch {}
      }
    };
    window.addEventListener("storage", handler);
    return () => window.removeEventListener("storage", handler);
  }, []);
  const savingRef = useRef(false);
  const surveysRef = useRef(surveys);
  const devActionRef = useRef(null);

  const formRef = useRef(EMPTY_FORM);
  const pendingSaveRef = useRef(null); // tracks in-flight row creation for new points
  useEffect(() => { surveysRef.current = surveys; }, [surveys]);

  // Dev edits: localStorage helper

    try { localStorage.setItem("nsi-dev-edits-" + curLocRef.current, JSON.stringify(d)); } catch(e) {}
  }

  const refreshSurveys = useCallback(async () => {
    if (savingRef.current) return;
    const result = await fetchSurveys(curLocRef.current);
    if (savingRef.current) return;
    if (result.error) { console.warn("Survey refresh failed:", result.error); return; }
    const sheetData = result.data || {};
    // Preserve local flagged values — the sheet may not have the column yet,
    // or there may be a race between our save and this poll fetch.
    const prev = surveysRef.current;
    for (const uid in sheetData) {
      if (!sheetData[uid].flagged && prev[uid] && prev[uid].flagged) {
        sheetData[uid].flagged = prev[uid].flagged;
      }
    }
    setSurveys(sheetData);
    // Always rebuild buildings from sheet (even if empty — clears stale data)
    const freshBuildings = sheetDataToBuildings(sheetData);
    baseBuildingsRef.current = freshBuildings;
    // Always refresh remote dev edits (adopt if newer)
    try {
      const remote = await fetchDevEdits(curLocRef.current);
      if (remote && (remote._ts || 0) > (devEditsRef.current._ts || 0)) {
        if (!remote.removed) remote.removed = [];
        if (!remote.moved) remote.moved = {};
        if (!remote.added) remote.added = [];
        devEditsRef.current = remote;
        setDevEdits(remote);
        saveLocalDev(remote);
      }
    } catch {}
    setBuildings(applyDevEdits(freshBuildings, devEditsRef.current));
  }, []);

  useEffect(() => {
    // Auto-pull from Google Sheet on startup
    const initFromSheet = async () => {
      try {
        const result = await fetchSurveys(curLocRef.current);
        if (result.error) {
          console.error("Initial load failed:", result.error);
          setTimeout(() => {
            if (typeof window.__showToast === "function") window.__showToast("⚠ Failed to load from Google Sheet: " + result.error, "error");
          }, 500);
          setLoading(false);
          return;
        }

        const sheetData = result.data || {};
        const sheetBuildings = sheetDataToBuildings(sheetData);
        baseBuildingsRef.current = sheetBuildings;
        setSurveys(sheetData);

        // Always restore dev edits (may contain added points even if sheet is empty)
        const best = await loadDevEdits(curLocRef.current);
        devEditsRef.current = best;
        setDevEdits(best);
        setBuildings(applyDevEdits(sheetBuildings, best));
        saveLocalDev(best);
      } catch (err) {
        console.error("Init failed:", err);
      }
      setLoading(false);
    };
    initFromSheet();
    // Poll surveys every 30s
    const interval = setInterval(refreshSurveys, 30000);
    return () => clearInterval(interval);
  }, []);

  const showToast = useCallback((msg, type="success") => {
    setToast({msg,type}); setTimeout(() => setToast(null), 3000);
  }, []);
  useEffect(() => { window.__showToast = showToast; return () => { delete window.__showToast; }; }, [showToast]);

  useEffect(() => {
    if (mapInst.current || !mapRef.current) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
    document.head.appendChild(link);
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
    script.onload = () => {
      const L = window.L;
      const map = L.map(mapRef.current, { zoomControl: false }).setView([40.761, -72.848], 13);
      L.control.zoom({ position: "topright" }).addTo(map);
      const streetLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OSM", maxZoom: 19,
      });
      const aerialLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        attribution: "&copy; Esri, Maxar, Earthstar Geographics", maxZoom: 19,
      });
      streetLayer.addTo(map);
      L.control.layers({ "Street": streetLayer, "Aerial": aerialLayer }, null, { position: "topright", collapsed: false }).addTo(map);
      mapInst.current = map;

      map.on("click", (e) => {
        if (window.__drawMode && window.__drawClick) {
          window.__drawClick(e.latlng.lat, e.latlng.lng);
        } else if (devActionRef.current === "move" && selectedRef.current) {
          window.__devMove(e.latlng.lat, e.latlng.lng);
        } else if (devActionRef.current === "add" || devActionRef.current === "demolished") {
          window.__devAdd(e.latlng.lat, e.latlng.lng);
        }
      });
    };
    document.head.appendChild(script);
  }, []);

  // Sync markers with buildings state
  useEffect(() => {
    if (!mapInst.current || !window.L) return;
    const L = window.L;
    // Remove old markers

    markersRef.current = {};
    Object.values(flagMarkersRef.current).forEach(m => m.remove());
    flagMarkersRef.current = {};
    // Create circle markers for all buildings
    buildings.forEach(b => {
      const isV = b.type === "verify";
      const m = L.circleMarker([b.lat, b.lng], {
        radius: isV ? mrkRv : mrkR,
        fillColor: isV ? "#3b82f6" : "#ef4444",

      }).addTo(mapInst.current);
      m.on("click", () => window.__sel(b.uid));
      markersRef.current[b.uid] = m;
    });
  }, [buildings]);

  const selRingRef = useRef(null);

  // Helper: check if a building passes all active filters
  const passesFilters = useCallback((b) => {
    const sv = surveys[b.uid];
    const pf = b.prefill || {};
    const d = sv || pf;
    const done = !!(sv && sv.savedAt);
    const isV = b.type === "verify";
    const isFlagged = d.flagged === "Yes";
    const isDemolished = d.flagged === "Demolished";
    // Status filter
    if (filter === "survey" && isV) return false;
    if (filter === "done" && !done) return false;
    if (filter === "pending" && done) return false;
    // Advanced filters
    if (advFilters.flagged === "yes" && !isFlagged) return false;
    if (advFilters.flagged === "no" && (isFlagged || isDemolished)) return false;
    if (advFilters.flagged === "demolished" && !isDemolished) return false;
    if (advFilters.occClass !== "all") {
      const occ = (d.occType || "").toUpperCase();
      if (advFilters.occClass === "RES" && !occ.startsWith("RES")) return false;
      if (advFilters.occClass === "COM" && !occ.startsWith("COM")) return false;
      if (advFilters.occClass === "IND" && !occ.startsWith("IND")) return false;
      if (advFilters.occClass === "OTHER" && (occ.startsWith("RES") || occ.startsWith("COM") || occ.startsWith("IND"))) return false;
    }
    if (advFilters.foundation !== "all" && (d.foundationType || "").toUpperCase() !== advFilters.foundation) return false;
    if (advFilters.bldgType !== "all" && (d.buildingType || "").toUpperCase() !== advFilters.bldgType) return false;
    return true;

  // Update markers style
  useEffect(() => {
    // Remove old selection ring

      const sv = surveys[b.uid];
      const pf = b.prefill || {};
      const d = sv || pf;
      const done = !!(sv && sv.savedAt);
      const isFlagged = d.flagged === "Yes";
      const isDemolished = d.flagged === "Demolished";
      const isV = b.type === "verify";
      const show = passesFilters(b);

      if (isFlagged && L && mapInst.current) {

        const flagIcon = L.divIcon({
          html: `<div style="opacity:${show?1:0.08};transition:opacity .2s;">${flagSvg}</div>`,

          iconSize: [24, 28],
          iconAnchor: [4, 27],

        fm.on("click", () => window.__sel(b.uid));
        flagMarkersRef.current[b.uid] = fm;
      } else if (isDemolished && L && mapInst.current) {
        // Demolished: hide circle marker, show black ✕ icon
        cm.setStyle({ fillOpacity: 0, opacity: 0, radius: 0 });
        const xSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18"><line x1="3" y1="3" x2="15" y2="15" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/><line x1="15" y1="3" x2="3" y2="15" stroke="#1e293b" stroke-width="3.5" stroke-linecap="round"/><line x1="3" y1="3" x2="15" y2="15" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="3" x2="3" y2="15" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/></svg>`;
        const xIcon = L.divIcon({
          html: `<div style="opacity:${show?1:0.08};transition:opacity .2s;">${xSvg}</div>`,
          className: '',
          iconSize: [18, 18],
          iconAnchor: [9, 9],
        });
        const fm = L.marker([b.lat, b.lng], { icon: xIcon, interactive: true, zIndexOffset: 300 }).addTo(mapInst.current);
        fm.on("click", () => window.__sel(b.uid));
        flagMarkersRef.current[b.uid] = fm;
      } else {
        // Non-flagged: normal circle marker
        cm.setStyle({
          fillColor: done ? "#22c55e" : isV ? "#3b82f6" : "#ef4444",
          color: "#fff",
          weight: 1.5,
          opacity: show ? 1 : 0.08,
          fillOpacity: show ? 0.85 : 0.05,
          radius: show ? (isV ? mrkRv : mrkR) : 3,
        });
      }
    });

    // Draw selection ring around selected point
    if (selected && mapInst.current && window.L) {
      const b = buildings.find(x => x.uid === selected);
      if (b) {
        selRingRef.current = window.L.circleMarker([b.lat, b.lng], {
          radius: isMobile ? 20 : 16,
          fillColor: "transparent",
          fillOpacity: 0,
          color: "#fbbf24",
          weight: 3,
          opacity: 0.9,
        }).addTo(mapInst.current);
      }
    }
  }, [surveys, filter, advFilters, passesFilters, buildings, selected]);

  useEffect(() => {
    window.__sel = (uid) => {
      if (devActionRef.current) return;
      if (window.__drawMode) return;
      const b = buildings.find(x => x.uid === uid);
      if (!b) return;
      // Skip warning if clicking the already-selected building
      const curSel = selectedRef.current;
      if (curSel && curSel !== uid && formRef.current) {
        const sv = surveysRef.current[curSel];
        const b0 = buildings.find(x => x.uid === curSel);
        const baseline = sv || (b0 && b0.prefill) || EMPTY_FORM;
        const formFields = ["numStories","firstFloorHeight","address","occType","foundationType","buildingType","area","yearBuilt","groundElev","structureValue","contentValue","notes","surveyor"];
        const hasEdits = formFields.some(k => (formRef.current[k] || "") !== (baseline[k] || ""));
        if (hasEdits) {
          if (!confirm("⚠️ You have unsaved changes on the current building.\n\nIf you switch to another building, these changes will be lost.\n\nContinue?")) return;
        }
      }
      setSelected(uid);
      const existing = surveys[uid];
      if (existing) setForm({...EMPTY_FORM, ...existing});
      else if (b.prefill) setForm({...EMPTY_FORM, ...b.prefill});
      else setForm(EMPTY_FORM);
      if (mapInst.current) mapInst.current.panTo([b.lat, b.lng], {animate: true});
    };
    return () => { delete window.__sel; };
  }, [surveys, buildings]);

  // Dev mode handlers exposed to map click
  useEffect(() => {
    devActionRef.current = devAction;
    selectedRef.current = selected;
  }, [devAction, selected]);

  // Keep form ref current for unsaved-changes checks
  useEffect(() => { formRef.current = form; }, [form]);

  useEffect(() => {
    window.__devMove = (lat, lng) => {
      const sel = selectedRef.current;
      if (!sel) return;
      const cur = devEditsRef.current;
      const next = { ...cur, moved: { ...cur.moved, [sel]: { lat, lng } } };
      // Immediately update the marker position without waiting for full rebuild
      const existingMarker = markersRef.current[sel];
      if (existingMarker) existingMarker.setLatLng([lat, lng]);
      const existingFlag = flagMarkersRef.current[sel];
      if (existingFlag) existingFlag.setLatLng([lat, lng]);
      if (selRingRef.current) selRingRef.current.setLatLng([lat, lng]);
      commitDevEdits(next);
      setDevAction(null);
      showToast("Point moved — auto-saving...");
    };
    window.__devAdd = (lat, lng) => {
      const isDemolished = devActionRef.current === "demolished";
      // Check for unsaved form changes on current building (skip for demolished since it doesn't change form)
      if (!isDemolished) {
        const curSel = selectedRef.current;
        if (curSel) {
          const sv = surveysRef.current[curSel];
          const b0 = buildings.find(x => x.uid === curSel);
          const baseline = sv || (b0 && b0.prefill) || EMPTY_FORM;
          const formFields = ["numStories","firstFloorHeight","address","occType","foundationType","buildingType","area","yearBuilt","groundElev","structureValue","contentValue","notes","surveyor"];
          const hasEdits = formFields.some(k => (formRef.current[k] || "") !== (baseline[k] || ""));
          if (hasEdits) {
            if (!confirm("⚠️ You have unsaved changes on the current building.\n\nIf you add a new point, these changes will be lost.\n\nContinue?")) return;
          }
        }
      }

      const cur = devEditsRef.current;
      let maxNewId = 10000;
      buildings.forEach(b => {
        const id = parseInt(b.nsiId || (b.uid.startsWith("new-") ? b.uid.replace("new-","") : "0"));
        if (id >= 10000 && id > maxNewId) maxNewId = id;
      });
      (cur.added||[]).forEach(a => {
        const id = parseInt(a.nsiId || "0");
        if (id >= 10000 && id > maxNewId) maxNewId = id;
      });
      const newId = maxNewId + 1;
      const uid = "new-" + newId;
      const newPt = { uid, type: "survey", nsiId: String(newId), lng, lat, prefill: null };
      const next = { ...cur, added: [...(cur.added||[]), newPt] };
      commitDevEdits(next);
      setDevAction(null);

      if (isDemolished) {
        const demData = { ...EMPTY_FORM, flagged: "Demolished" };
        setSurveys(prev => ({...prev, [uid]: demData}));
        pendingSaveRef.current = saveSurveyEntry(uid, "survey", String(newId), lng, lat, { ...demData, basement: "No" }, curLocRef.current).catch(err => {
          console.warn("Failed to create demolished point row:", err);
        }).finally(() => { pendingSaveRef.current = null; });
        setSelected(uid);
        setForm(demData);
        if (mapInst.current) mapInst.current.panTo([lat, lng], {animate: true});
        showToast("✕ Demolished site #" + newId + " marked");
      } else {
        pendingSaveRef.current = saveSurveyEntry(uid, "survey", String(newId), lng, lat, { ...EMPTY_FORM }, curLocRef.current).catch(err => {
          console.warn("Failed to create sheet row for new point:", err);
        }).finally(() => { pendingSaveRef.current = null; });
        setSelected(uid);
        setForm(EMPTY_FORM);
        if (mapInst.current) mapInst.current.panTo([lat, lng], {animate: true});
        showToast("Point #" + newId + " added — auto-saving...");
      }
    };
    return () => { delete window.__devMove; delete window.__devAdd; };
  }, [showToast, commitDevEdits]);

  const devRemove = async () => {
    if (!selected) return;
    const b = buildings.find(x => x.uid === selected);
    const bLabel = b ? (b.nsiId || b.uid) : selected;
    if (!confirm("⚠️ Remove building #" + bLabel + "?\n\nThis will permanently delete the point and ALL of its data (survey fields, notes, flag) from the map and the Google Sheet.\n\nThis action cannot be undone.\n\nContinue?")) return;
    const uidToRemove = selected;
    const cur = devEditsRef.current;
    const newMoved = { ...cur.moved };
    delete newMoved[uidToRemove];
    const next = {
      removed: [...(cur.removed||[]), uidToRemove],
      moved: newMoved,
      added: (cur.added||[]).filter(a => a.uid !== uidToRemove),
    };
    commitDevEdits(next);
    setSurveys(prev => { const u = {...prev}; delete u[uidToRemove]; return u; });
    setSelected(null); setForm(EMPTY_FORM);
    // Delete from sheet immediately — don't wait for debounce
    try {
      await deleteSurveyEntry(uidToRemove, curLocRef.current);
      showToast("Point #" + bLabel + " removed & deleted from Sheet", "info");
    } catch (err) {
      showToast("Point removed locally but sheet delete failed: " + err.message, "error");
    }
  };

  const devDuplicate = () => {
    if (!selected) return;
    const b = buildings.find(x => x.uid === selected);
    if (!b) return;
    const cur = devEditsRef.current;
    // Find next available ID
    let maxNewId = 10000;
    buildings.forEach(bi => {
      const id = parseInt(bi.nsiId || (bi.uid.startsWith("new-") ? bi.uid.replace("new-","") : "0"));
      if (id >= 10000 && id > maxNewId) maxNewId = id;
    });
    (cur.added||[]).forEach(a => {
      const id = parseInt(a.nsiId || "0");
      if (id >= 10000 && id > maxNewId) maxNewId = id;
    });
    const newId = maxNewId + 1;
    const uid = "new-" + newId;
    // Offset slightly to the right (~15m at mid-latitudes)
    const offsetLng = b.lng + 0.00015;
    const newPt = { uid, type: "survey", nsiId: String(newId), lng: offsetLng, lat: b.lat, prefill: null };
    const next = { ...cur, added: [...(cur.added||[]), newPt] };
    commitDevEdits(next);
    // Copy all current data from the source building
    const sv = surveysRef.current[selected];
    const pf = b.prefill || {};
    const sourceData = { ...EMPTY_FORM, ...(sv || pf) };
    // Clear savedAt so the duplicate starts as unsaved
    const dupData = { ...sourceData, savedAt: "" };
    setSurveys(prev => ({...prev, [uid]: dupData}));
    // Create sheet row with the duplicated data
    const basement = (dupData.foundationType || "").toUpperCase() === "B" ? "Yes" : "No";
    pendingSaveRef.current = saveSurveyEntry(uid, "survey", String(newId), offsetLng, b.lat, { ...dupData, basement }, curLocRef.current).catch(err => {
      console.warn("Failed to create sheet row for duplicated point:", err);
    }).finally(() => { pendingSaveRef.current = null; });
    // Select the new duplicate
    setSelected(uid);
    setForm(dupData);
    if (mapInst.current) mapInst.current.panTo([b.lat, offsetLng], {animate: true});
    showToast("Point #" + newId + " duplicated from " + (b.nsiId || b.uid));
  };

  const devResetAll = async () => {
    if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
    savingRef.current = true;
    try {
      const fresh = { removed: [], moved: {}, added: [], _ts: Date.now() };
      devEditsRef.current = fresh;
      setDevEdits(fresh);
      setBuildings(applyDevEdits(baseBuildingsRef.current, fresh));
      saveLocalDev(fresh);
      setSelected(null); setForm(EMPTY_FORM);

      savingRef.current = false;
    }
  };

    if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
    savingRef.current = true;
    setDevSyncing(true);
    try {
      const cur = devEditsRef.current;
      const curBuildings = applyDevEdits(baseBuildingsRef.current, cur);
      await saveDevEditsRemote(cur, curLocRef.current);
      for (const uid of (cur.removed||[])) {
        await deleteSurveyEntry(uid, curLocRef.current);
      }
      for (const uid in (cur.moved||{})) {
        const b = curBuildings.find(x => x.uid === uid);
        if (!b) continue;
        const s = surveysRef.current[uid] || (b.prefill ? {...b.prefill} : null);
        if (s) {
          await saveSurveyEntry(uid, b.type, b.nsiId, b.lng, b.lat, {...s, savedAt: s.savedAt || ""}, curLocRef.current);
        }
      }
      setDevDirty(false);
      showToast("Dev edits synced to Google Sheet!");
    } catch (err) {
      showToast("Dev sync failed: " + err.message, "error");
    } finally {
      setDevSyncing(false);
      savingRef.current = false;
    }
  };

  const [flagging, setFlagging] = useState(false);
  const toggleFlag = async () => {
    if (!selected || flagging || saving) return;

    if (!b) return;
    const newFlagged = form.flagged === "Yes" ? "" : "Yes";
    savingRef.current = true;
    const currentForm = { ...form, flagged: newFlagged };
    // Update UI immediately
    setForm(f => ({...f, flagged: newFlagged}));
    setSurveys(prev => {
      const existing = prev[selected] || {};
      return {...prev, [selected]: {...existing, flagged: newFlagged}};
    });
    setFlagging(true);

      // Wait for any in-flight row creation to complete first
      if (pendingSaveRef.current) {
        await pendingSaveRef.current;
        pendingSaveRef.current = null;
      }
      // Try the patch-only approach first
      let patchSucceeded = false;
      try {
        const result = await updateFlagEntry(selected, newFlagged, curLocRef.current);
        patchSucceeded = result && result.ok && !result.fallback && !result.needsRow;
      } catch (e) {
        // patch failed — fall through to full save
      }
      // If patch didn't succeed for any reason, do a full row save to guarantee persistence
      if (!patchSucceeded) {
        const basement = (currentForm.foundationType || "").toUpperCase() === "B" ? "Yes" : "No";
        const entry = { ...currentForm, basement };
        await saveSurveyEntry(selected, b.type, b.nsiId, b.lng, b.lat, entry, curLocRef.current);
        setSurveys(prev => ({...prev, [selected]: entry}));
      }
      showToast(newFlagged === "Yes" ? "🚩 Flagged for site visit" : "Flag removed");
    } catch (err) {
      showToast("Flag sync failed: " + err.message, "error");
      // Revert UI on total failure
      const oldFlagged = newFlagged === "Yes" ? "" : "Yes";
      setForm(f => ({...f, flagged: oldFlagged}));
      setSurveys(prev => {
        const existing = prev[selected] || {};
        return {...prev, [selected]: {...existing, flagged: oldFlagged}};
      });

      setFlagging(false);
      savingRef.current = false;
    }
  };

  const [savingNotes, setSavingNotes] = useState(false);
  const saveNotes = async () => {
    if (!selected || savingNotes) return;

    setSavingNotes(true);
    try {
      if (pendingSaveRef.current) {

  const finishDrawing = () => {
    const pts = drawPointsRef.current;
    if (pts.length < 3) { showToast("Need at least 3 points to form a polygon", "error"); return; }
    // Calculate area using Shoelace with geodesic correction
    const midLat = pts.reduce((s, p) => s + p[0], 0) / pts.length;
    const degLng2m = Math.cos(midLat * Math.PI / 180) * 111320;
    const degLat2m = 110540;
    let area = 0;
    for (let i = 0; i < pts.length; i++) {
      const j = (i + 1) % pts.length;
      const xi = pts[i][1] * degLng2m, yi = pts[i][0] * degLat2m;
      const xj = pts[j][1] * degLng2m, yj = pts[j][0] * degLat2m;
      area += xi * yj - xj * yi;
    }
    const sqM = Math.abs(area) / 2;
    const sqft = Math.round(sqM * 10.7639);
    setForm(f => ({...f, area: String(sqft)}));
    showToast("Drawn area: " + sqft.toLocaleString() + " sqft");
    cancelDrawing();

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,color:"#94a3b8"}}>{filteredUids.length} / {buildings.length} shown</span>
                {Object.values(advFilters).some(v=>v!=="all") && (
                  <button onClick={()=>setAdvFilters({flagged:"all",occClass:"all",foundation:"all",bldgType:"all"})} style={{padding:"3px 10px",borderRadius:4,border:"none",cursor:"pointer",background:"#334155",color:"#f97316",fontSize:10,fontWeight:600}}>Clear</button>
                )}
              </div>
            </div>
          </div>

          {/* ─── Actions ─── */}
          <div style={{borderTop:"1px solid #1e293b",paddingTop:8,marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Actions</div>
            <div style={{display:"flex",gap:5,marginBottom:5}}>
              <button onClick={goToNearest} style={abtn("#0f766e")}>📍 Nearest</button>
              <button onClick={exportXLSX} style={abtn("#7c3aed")}>📥 Export</button>
            </div>
            <div style={{display:"flex",gap:5,marginBottom:5}}>
              <button onClick={()=>window.open(SHEET_URL,"_blank")} style={abtn("#0369a1")}>📊 Sheet</button>
              <button onClick={()=>window.open(README_URL,"_blank")} style={abtn("#475569")}>📖 Docs</button>
            </div>
            <div style={{display:"flex",gap:5}}>
              <button onClick={pullFromSheet} disabled={pulling} style={abtn("#1d4ed8")}>{pulling ? "⏳..." : "⬇ Pull"}</button>
              <button onClick={syncAllToSheet} disabled={sheetSyncing} style={abtn("#b45309")}>{sheetSyncing ? "⏳..." : "☁️ Sync"}</button>
            </div>
          </div>

          {/* ─── Point Management ─── */}
          <div style={{borderTop:"1px solid #1e293b",paddingTop:8}}>
            <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Point Management</div>
            <div style={{padding:"10px 12px",borderRadius:8,background:"#1c1917",border:"1px solid #422006"}}>
              <div style={{display:"flex",gap:5,marginBottom:6}}>
                <button onClick={()=>setDevAction(devAction==="add"?null:"add")} style={{
                  flex:1,padding:"6px",borderRadius:6,border:devAction==="add"?"2px solid #22c55e":"1px solid #334155",
                  cursor:"pointer",background:devAction==="add"?"#14532d":"#1e293b",
                  color:devAction==="add"?"#4ade80":"#94a3b8",fontWeight:600,fontSize:11,
                }}>{devAction==="add"?"🟢 Click Map...":"➕ Add"}</button>
                <button onClick={()=>{
                  if (!selected) { showToast("Select a point first","error"); return; }
                  setDevAction(devAction==="move"?null:"move");
                }} style={{
                  flex:1,padding:"6px",borderRadius:6,border:devAction==="move"?"2px solid #3b82f6":"1px solid #334155",
                  cursor:"pointer",background:devAction==="move"?"#1e3a5f":"#1e293b",
                  color:devAction==="move"?"#60a5fa":"#94a3b8",fontWeight:600,fontSize:11,
                }}>{devAction==="move"?"🔵 Click Map...":"✥ Move"}</button>
              </div>
              <div style={{display:"flex",gap:5,marginBottom:6}}>
                <button onClick={()=>{
                  if (!selected) { showToast("Select a point first","error"); return; }
                  devDuplicate();
                }} style={{flex:1,padding:"6px",borderRadius:6,border:"1px solid #334155",cursor:"pointer",background:"#1e293b",color:"#a78bfa",fontWeight:600,fontSize:11}}>
                  📋 Duplicate
                </button>
                <button onClick={()=>{
                  if (!selected) { showToast("Select a point first","error"); return; }
                  devRemove();
                }} style={{flex:1,padding:"6px",borderRadius:6,border:"1px solid #7f1d1d",cursor:"pointer",background:"#1e293b",color:"#f87171",fontWeight:600,fontSize:11}}>
                  🗑 Remove
                </button>
              </div>
              <button onClick={()=>setDevAction(devAction==="demolished"?null:"demolished")} style={{
                width:"100%",padding:"6px",borderRadius:6,marginBottom:6,
                border:devAction==="demolished"?"2px solid #94a3b8":"1px solid #334155",
                cursor:"pointer",background:devAction==="demolished"?"#334155":"#1e293b",
                color:devAction==="demolished"?"#e2e8f0":"#94a3b8",fontWeight:600,fontSize:11,
              }}>{devAction==="demolished"?"✕ Click Map to Mark...":"✕ Mark Demolished"}</button>
              {devEditCount > 0 && (
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>{ if (confirm("Clear all edits and sync?\n\nSynced deletions cannot be restored. Use Pull Sheet to reload.")) devResetAll(); }} style={{
                    flex:1,padding:"5px",borderRadius:5,border:"1px solid #334155",cursor:"pointer",background:"#1e293b",color:"#f59e0b",fontWeight:600,fontSize:10,
                  }}>↩ Clear ({devEditCount})</button>
                  {devDirty && (
                    <button onClick={devSyncToServer} disabled={devSyncing} style={{
                      flex:1,padding:"5px",borderRadius:5,border:"none",cursor:devSyncing?"wait":"pointer",
                      background:devSyncing?"#334155":"#16a34a",color:"#fff",fontWeight:600,fontSize:10,
                    }}>{devSyncing ? "⏳..." : "☁️ Sync Now"}</button>
                  )}
                </div>
              )}
              {!devDirty && devEditCount > 0 && (
                <div style={{marginTop:5,fontSize:10,color:"#4ade80",textAlign:"center"}}>✓ Synced</div>
              )}
              {selected && selB && (

                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* ═══ CENTER: Map ═══ */}
      <div style={{flex:1,position:"relative"}}>
        <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
        {devAction && (
          <div style={{
            position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",zIndex:1000,
            padding:"8px 20px",borderRadius:8,
            background:devAction==="add"?"rgba(22,101,52,.9)":devAction==="demolished"?"rgba(51,65,85,.9)":"rgba(30,58,138,.9)",
            color:"#fff",fontWeight:600,fontSize:13,boxShadow:"0 4px 16px rgba(0,0,0,.4)",
            display:"flex",alignItems:"center",gap:10,
          }}>
            {devAction==="add" ? "➕ Click map to place new point" : devAction==="demolished" ? "✕ Click map to mark demolished site" : "✥ Click map to move selected point"}
            <button onClick={()=>setDevAction(null)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontWeight:700}}>Cancel</button>
          </div>
        )}
        {drawingMode && (
          <div style={{
            position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",zIndex:1000,
            padding:"8px 20px",borderRadius:8,
            background:"rgba(120,80,0,.9)",
            color:"#fff",fontWeight:600,fontSize:13,boxShadow:"0 4px 16px rgba(0,0,0,.4)",
            display:"flex",alignItems:"center",gap:10,
          }}>

            <button onClick={finishDrawing} style={{background:"#16a34a",border:"none",color:"#fff",borderRadius:4,padding:"4px 12px",cursor:"pointer",fontWeight:700}}>Done</button>
            <button onClick={cancelDrawing} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:4,padding:"4px 8px",cursor:"pointer",fontWeight:700}}>Cancel</button>
          </div>
        )}
        {loading && (
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,.8)",zIndex:1000}}>
            <div style={{color:"#94a3b8",textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:8,animation:"pulse 1.5s infinite"}}>☁️</div>
              <div style={{fontSize:14,fontWeight:600}}>Loading from Google Sheet...</div>
            </div>
          </div>
        )}
      </div>

      {/* ═══ RIGHT PANEL: Building Detail ═══ */}
      <div style={{width:380,minWidth:380,display:"flex",flexDirection:"column",borderLeft:"1px solid #1e293b",background:"#0f172a",overflow:"auto"}}>
        <div style={{padding:"12px 14px"}}>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            <input type="text" placeholder="Search by ID..." value={searchId} onChange={e=>setSearchId(e.target.value)} onKeyDown={e=>{if(e.key==="Enter") searchById();}} style={{flex:1,padding:"7px 10px",borderRadius:7,border:"1px solid #334155",background:"#1e293b",color:"#e2e8f0",fontSize:12}}/>
            <button onClick={searchById} style={{padding:"7px 14px",borderRadius:7,border:"none",cursor:"pointer",background:"#334155",color:"#e2e8f0",fontWeight:700,fontSize:12}}>🔍</button>
          </div>
          {buildings.length === 0 && !loading ? (
            <div style={{textAlign:"center",marginTop:60,color:"#475569"}}>
              <div style={{fontSize:40,marginBottom:8}}>☁️</div>
              <div style={{fontSize:13,fontWeight:600,color:"#94a3b8"}}>No data loaded</div>
              <div style={{fontSize:11,marginTop:4,marginBottom:14}}>Pull data from Google Sheet</div>
              <button onClick={pullFromSheet} disabled={pulling} style={{padding:"8px 20px",borderRadius:7,border:"none",cursor:"pointer",background:"#1d4ed8",color:"#fff",fontWeight:700,fontSize:13}}>
                {pulling ? "⏳ Pulling..." : "⬇ Pull from Sheet"}
              </button>
            </div>
          ) : !selected ? (
            <div style={{textAlign:"center",marginTop:60,color:"#475569"}}>
              <div style={{fontSize:40,marginBottom:8}}>📍</div>
              <div style={{fontSize:13,fontWeight:600}}>Select a building</div>
              <div style={{fontSize:11,marginTop:4}}>Click a marker on the map</div>
            </div>
          ) : (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#f8fafc"}}>
                    ID: {selB.nsiId || selB.uid}
                    <span style={{marginLeft:6,fontSize:9,padding:"2px 6px",borderRadius:4,
                      background:selB.type==="verify"?"#1e3a5f":"#3b1219",
                      color:selB.type==="verify"?"#60a5fa":"#fca5a5"
                    }}>{selB.type==="verify"?"VERIFY":"NEW"}</span>
                    {surveys[selected] && surveys[selected].savedAt && <span style={{marginLeft:4,fontSize:9,padding:"2px 6px",borderRadius:4,background:"#166534",color:"#4ade80"}}>SAVED</span>}
                    {((surveys[selected] || (selB && selB.prefill) || {}).flagged === "Yes") && <span style={{marginLeft:4,fontSize:9,padding:"2px 6px",borderRadius:4,background:"#431407",color:"#fb923c"}}>🚩</span>}
                    {((surveys[selected] || (selB && selB.prefill) || {}).flagged === "Demolished") && <span style={{marginLeft:4,fontSize:9,padding:"2px 6px",borderRadius:4,background:"#334155",color:"#94a3b8"}}>✕ DEMOLISHED</span>}
                  </div>
                  <div style={{fontSize:10,color:"#64748b",marginTop:1}}>{selB.lat.toFixed(6)}, {selB.lng.toFixed(6)}</div>
                </div>
                <button onClick={()=>{setSelected(null);setForm(EMPTY_FORM);cancelDrawing();}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:16}}>✕</button>
              </div>

              <div style={{display:"flex",gap:5,marginBottom:8}}>
                <button onClick={navigateToBuilding} style={{flex:1,padding:"6px",borderRadius:7,border:"none",cursor:"pointer",background:"#1d4ed8",color:"#fff",fontWeight:600,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  🧭 Navigate
                </button>
                <button onClick={()=>{if(!selected)return;const b=buildings.find(x=>x.uid===selected);window.open(`https://www.google.com/maps/@${b.lat},${b.lng},100m/data=!3m1!1e3`,"_blank");}} style={{flex:1,padding:"6px",borderRadius:7,border:"none",cursor:"pointer",background:"#0369a1",color:"#fff",fontWeight:600,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  🌍 3D View
                </button>
              </div>

              {/* ─── Flag + Notes (independent of Save) ─── */}
              <button onClick={toggleFlag} disabled={flagging||saving} style={{
                width:"100%",padding:"7px",borderRadius:7,cursor:(flagging||saving)?"wait":"pointer",fontWeight:700,fontSize:11,
                display:"flex",alignItems:"center",justifyContent:"center",gap:5,marginBottom:6,
                border:form.flagged==="Yes"?"2px solid #f97316":form.flagged==="Demolished"?"2px solid #64748b":"1px solid #334155",
                background:form.flagged==="Yes"?"#431407":form.flagged==="Demolished"?"#1e293b":"#1e293b",
                color:form.flagged==="Yes"?"#fb923c":form.flagged==="Demolished"?"#94a3b8":"#94a3b8",
              }}>{flagging?"⏳ Syncing...":form.flagged==="Yes"?"🚩 Flagged — Needs Site Visit":form.flagged==="Demolished"?"✕ Marked as Demolished":"🏳️ Flag for Site Visit"}</button>

              <div style={{marginBottom:10}}>
                <FLD label="Notes">
                  <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Observations, comments..." rows={2} style={{...inp,resize:"vertical",marginBottom:4}}/>
                </FLD>
                <button onClick={saveNotes} disabled={savingNotes} style={{
                  width:"100%",padding:"6px",borderRadius:6,border:"none",cursor:savingNotes?"wait":"pointer",
                  background:"#334155",color:"#e2e8f0",fontWeight:600,fontSize:11,
                }}>{savingNotes?"⏳ Saving...":"📝 Save Notes"}</button>
              </div>

              <div style={{borderTop:"1px solid #1e293b",paddingTop:10}}>

              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <FLD label="Surveyor">
                  <input value={form.surveyor} onChange={e=>setForm(f=>({...f,surveyor:e.target.value}))} placeholder="Your name" style={inp}/>
                </FLD>
                <FLD label="Address">
                  <input value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} placeholder="Street address" style={inp}/>
                </FLD>
                <FLD label="Stories *">
                  <input type="number" min="1" max="99" value={form.numStories} onChange={e=>setForm(f=>({...f,numStories:e.target.value}))} style={inp}/>
                </FLD>
                <div style={{display:"flex",gap:6}}>
                  <FLD label="Occupancy Type *" s={{flex:2}}>
                    <select value={form.occType} onChange={e=>setForm(f=>({...f,occType:e.target.value}))} style={{...inp,appearance:"auto"}}>
                      <option value="">— Select —</option>
                      <optgroup label="Residential">
                        {OCC_TYPES.filter(o=>o.code.startsWith("RES")).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                      </optgroup>
                      <optgroup label="Commercial">
                        {OCC_TYPES.filter(o=>o.code.startsWith("COM")).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                      </optgroup>
                      <optgroup label="Industrial">
                        {OCC_TYPES.filter(o=>o.code.startsWith("IND")).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                      </optgroup>
                      <optgroup label="Other">
                        {OCC_TYPES.filter(o=>!/^(RES|COM|IND)/.test(o.code)).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                      </optgroup>
                    </select>
                  </FLD>
                  <FLD label="Bldg Type" s={{flex:1}}>
                    <select value={form.buildingType} onChange={e=>setForm(f=>({...f,buildingType:e.target.value}))} style={{...inp,appearance:"auto"}}>
                      <option value="">—</option>
                      <option value="W">W — Wood</option>
                      <option value="M">M — Masonry</option>
                      <option value="C">C — Concrete</option>
                      <option value="S">S — Steel</option>
                      <option value="H">H — Manufactured</option>
                    </select>
                  </FLD>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <FLD label="Foundation Type *" s={{flex:1}}>
                    <select value={form.foundationType} onChange={e=>setForm(f=>({...f,foundationType:e.target.value}))} style={{...inp,appearance:"auto"}}>
                      <option value="">— Select —</option>
                      <option value="S">S — Slab on Grade</option>
                      <option value="C">C — Crawlspace</option>
                      <option value="B">B — Basement</option>
                      <option value="P">P — Pier/Pile</option>
                      <option value="W">W — Solid Wall</option>
                      <option value="U">U — Unknown</option>
                    </select>
                  </FLD>
                  <FLD label="1st Floor Ht (ft)" s={{flex:1}}>
                    <input type="number" min="0" max="30" step="0.5" value={form.firstFloorHeight} onChange={e=>setForm(f=>({...f,firstFloorHeight:e.target.value}))} style={inp}/>
                  </FLD>
                </div>
                <div style={{display:"flex",gap:3,alignItems:"flex-end"}}>
                  <FLD label="Footprint (sqft)" s={{flex:1}}>
                    <input type="number" value={form.area} onChange={e=>setForm(f=>({...f,area:e.target.value}))} style={inp}/>
                  </FLD>
                  <button onClick={autoFetchArea} disabled={fetchingArea||drawingMode} title="Microsoft Building Footprints" style={{padding:"7px 8px",borderRadius:6,border:"1px solid #334155",cursor:fetchingArea?"wait":"pointer",background:fetchingArea?"#334155":"#1e3a5f",color:"#60a5fa",fontWeight:700,fontSize:9,whiteSpace:"nowrap"}}>{fetchingArea ? "⏳" : "🏠 Auto"}</button>
                  <button onClick={drawingMode ? cancelDrawing : startDrawing} disabled={!!devAction} title="Draw polygon on map" style={{padding:"7px 8px",borderRadius:6,border:drawingMode?"2px solid #f59e0b":"1px solid #334155",cursor:"pointer",background:drawingMode?"#422006":"#1e3a5f",color:drawingMode?"#fbbf24":"#60a5fa",fontWeight:700,fontSize:9,whiteSpace:"nowrap"}}>{drawingMode ? "✕" : "✏️ Draw"}</button>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <FLD label="Year Built" s={{flex:1}}>
                    <input type="number" value={form.yearBuilt} onChange={e=>setForm(f=>({...f,yearBuilt:e.target.value}))} style={inp}/>
                  </FLD>
                  <FLD label="Ground Elev (ft)" s={{flex:1}}>
                    <div style={{display:"flex",gap:3}}>
                      <input type="number" step="0.01" value={form.groundElev} onChange={e=>setForm(f=>({...f,groundElev:e.target.value}))} style={{...inp,flex:1}}/>
                      <button onClick={autoFetchElevation} disabled={fetchingElev} title="USGS 3DEP" style={{padding:"5px 8px",borderRadius:6,border:"1px solid #334155",cursor:fetchingElev?"wait":"pointer",background:fetchingElev?"#334155":"#1e3a5f",color:"#60a5fa",fontWeight:700,fontSize:9,whiteSpace:"nowrap"}}>{fetchingElev ? "⏳" : "📐"}</button>
                    </div>
                  </FLD>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
                  <FLD label="Structure Value ($)" s={{flex:1}}>
                    <input type="number" value={form.structureValue} onChange={e=>setForm(f=>({...f,structureValue:e.target.value}))} style={inp}/>
                  </FLD>
                  <FLD label="Content Value ($)" s={{flex:1}}>
                    <input type="number" value={form.contentValue} onChange={e=>setForm(f=>({...f,contentValue:e.target.value}))} style={inp}/>
                  </FLD>
                  <button onClick={autoEstimateCost} title="OLS regression estimate" style={{padding:"7px 8px",borderRadius:6,border:"1px solid #334155",cursor:"pointer",background:"#1e3a5f",color:"#60a5fa",fontWeight:700,fontSize:9,whiteSpace:"nowrap"}}>💰</button>
                </div>
              </div>
              </div>

              <div style={{display:"flex",gap:6,marginTop:10}}>
                <button onClick={handleSave} disabled={saving||flagging} style={{
                  flex:1,padding:"9px",borderRadius:8,border:"none",cursor:(saving||flagging)?"wait":"pointer",
                  background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontWeight:700,fontSize:12,
                }}>{saving?"Saving...":"💾 Save"}</button>
                {surveys[selected] && surveys[selected].savedAt && <button onClick={handleUndoSave} style={{padding:"9px 12px",borderRadius:8,border:"1px solid #7f1d1d",cursor:"pointer",background:"#1e293b",color:"#f87171",fontWeight:600,fontSize:12}}>🗑 Clear</button>}
              </div>

              <div style={{display:"flex",gap:6,marginTop:6,paddingBottom:16}}>
                <button onClick={()=>{const i=filteredUids.indexOf(selected);const p=i>0?i-1:filteredUids.length-1;window.__sel(filteredUids[p]);}} style={abtn("#334155")}>← Prev</button>
                <button onClick={()=>{const i=filteredUids.indexOf(selected);const n=i<filteredUids.length-1?i+1:0;window.__sel(filteredUids[n]);}} style={abtn("#334155")}>Next →</button>
              </div>
            </div>
          )}
        </div>
      </div>

      <style>{`
        .leaflet-container { background: #0f172a !important; }
        ${(devAction || drawingMode) ? '.leaflet-container { cursor: crosshair !important; }' : ''}
        ${(drawingMode || devAction === "move" || devAction === "demolished") ? '.leaflet-marker-pane, .leaflet-overlay-pane circle, .leaflet-overlay-pane path { pointer-events: none !important; }' : ''}
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        .leaflet-control-layers { background: rgba(15,23,42,.9) !important; border: 1px solid #334155 !important; border-radius: 8px !important; padding: 8px 12px !important; color: #e2e8f0 !important; font-size: 12px !important; font-weight: 600 !important; backdrop-filter: blur(8px); box-shadow: 0 4px 12px rgba(0,0,0,.4) !important; }
        .leaflet-control-layers label { color: #e2e8f0 !important; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 2px 0; }
        .leaflet-control-layers-separator { border-top: 1px solid #334155 !important; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
      `}</style>
    </div>
  );
}

function FLD({label,children,s}) {
  return <div style={s}><label style={{display:"block",fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>{label}</label>{children}</div>;
}

const inp = {width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #334155",background:"#1e293b",color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box"};

function abtn(bg) {
  return {flex:1,padding:"6px 0",borderRadius:6,border:"none",cursor:"pointer",background:bg,color:"#e2e8f0",fontWeight:600,fontSize:11,textAlign:"center"};
}


  

function PasswordGate({ onUnlock }) {
  const [pw, setPw] = React.useState("");
  const [error, setError] = React.useState(false);

  React.useEffect(() => {
    const saved = sessionStorage.getItem("nsi-auth");
    if (saved === "ok") onUnlock();
  }, []);

  const handleSubmit = () => {
    if (pw === atob("TlkyMDI2VkE=")) {
      sessionStorage.setItem("nsi-auth", "ok");
      onUnlock();
    } else {
      setError(true);
      setTimeout(() => setError(false), 2000);
    }
  };

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0f172a",fontFamily:"'Segoe UI',system-ui,sans-serif",padding:20}}>
      <div style={{maxWidth:400,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🔒</div>
        <h1 style={{color:"#f8fafc",fontSize:20,fontWeight:700,margin:"0 0 4px"}}>NSI Field Survey Tool</h1>
        <p style={{color:"#64748b",fontSize:13,marginBottom:24}}>Enter password to continue</p>
        <div style={{display:"flex",gap:8}}>
          <input type="password" value={pw}
            onChange={e=>{setPw(e.target.value);setError(false);}}
            onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
            placeholder="Password" autoFocus
            style={{flex:1,padding:"12px 16px",borderRadius:8,border:error?"2px solid #dc2626":"1px solid #334155",background:"#1e293b",color:"#e2e8f0",fontSize:15,outline:"none",boxSizing:"border-box"}}
          />
          <button onClick={handleSubmit} style={{padding:"12px 24px",borderRadius:8,border:"none",cursor:"pointer",background:"#3b82f6",color:"#fff",fontWeight:700,fontSize:14}}>Go</button>
        </div>
        {error && <div style={{marginTop:10,color:"#f87171",fontSize:13,fontWeight:600}}>Incorrect password</div>}
      </div>
    </div>
  );
}

function Root() {
  const [authed, setAuthed] = React.useState(false);
  if (!authed) return <PasswordGate onUnlock={() => setAuthed(true)} />;
  return <App />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);

  </script>
</body>
</html>
