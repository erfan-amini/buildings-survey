// ─── Robust fetch helper: throws on non-OK responses ───
async function postJson(payload) {
  const r = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload),
  });
  if (!r.ok) {
    const text = await r.text().catch(() => "");
    throw new Error(`HTTP ${r.status}: ${text.slice(0, 200)}`);
  }
  const ct = r.headers.get("content-type") || "";
  return ct.includes("application/json") ? r.json() : r.text();
}

async function fetchSurveys(location) {
  try {
    const r = await fetch(API_URL + "?location=" + encodeURIComponent(location || "shinnecock"));
    if (!r.ok) {
      const text = await r.text().catch(() => "");
      throw new Error(`HTTP ${r.status}: ${text.slice(0, 200)}`);
    }
    const raw = await r.json();
    if (raw.error) throw new Error(raw.error);
    // Map Google Sheet column names to form field names
    const mapped = {};
    for (const uid in raw) {
      const s = raw[uid];
      mapped[uid] = {
        occType: s.occupancy_type || s.occType || "",
        buildingType: s.building_type || s.buildingType || "",
        numStories: String(s.number_of_stories || s.numStories || ""),
        area: String(s.area || ""),
        foundationType: s.foundation_type || s.foundationType || "",
        firstFloorHeight: String(s.foundation_height || s.firstFloorHeight || ""),
        yearBuilt: String(s.year_built || s.yearBuilt || ""),
        groundElev: String(s.ground_elevation || s.groundElev || ""),
        address: s.address || "",
        structureValue: String(s.structure_value || s.structureValue || ""),
        contentValue: String(s.content_value || s.contentValue || ""),
        basement: s.basement || "",
        notes: s.notes || "",
        surveyor: s.surveyor || "",
        savedAt: s.savedAt || "",
        longitude: s.longitude || "",
        latitude: s.latitude || "",
        survey_type: s.survey_type || "",
        ID: s.ID || "",
      };
    }
    return { data: mapped, error: null };
  } catch(e) {
    console.error("Fetch surveys failed:", e);
    return { data: {}, error: e.message };
  }
}

// ─── Microsoft Building Footprints (ArcGIS) ───
const MSBFP_URL = "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/MSBFP2/FeatureServer/0/query";

async function fetchBuildingFootprintArea(lng, lat) {
  const params = new URLSearchParams({
    geometry: `${lng},${lat}`,
    geometryType: "esriGeometryPoint",
    spatialRel: "esriSpatialRelIntersects",
    returnGeometry: "true",
    outFields: "*",
    inSR: "4326",
    outSR: "4326",
    f: "json",
  });
  const r = await fetch(`${MSBFP_URL}?${params}`);
  if (!r.ok) throw new Error(`ArcGIS HTTP ${r.status}`);
  const data = await r.json();
  if (!data.features || data.features.length === 0) return null;

  // Compute area for each matching polygon, pick the smallest (most specific building)
  function calcRingsArea(rings) {
    let totalSqM = 0;
    for (let ri = 0; ri < rings.length; ri++) {
      const ring = rings[ri];
      const midLat = ring.reduce((s, p) => s + p[1], 0) / ring.length;
      const degLng2m = Math.cos(midLat * Math.PI / 180) * 111320;
      const degLat2m = 110540;
      let area = 0;
      for (let i = 0; i < ring.length; i++) {
        const j = (i + 1) % ring.length;
        const xi = ring[i][0] * degLng2m, yi = ring[i][1] * degLat2m;
        const xj = ring[j][0] * degLng2m, yj = ring[j][1] * degLat2m;
        area += xi * yj - xj * yi;
      }
      const signedArea = area / 2;
      totalSqM += (ri === 0) ? Math.abs(signedArea) : -Math.abs(signedArea);
    }
    return Math.max(0, totalSqM);
  }

  let bestSqM = Infinity;
  for (const feat of data.features) {
    const rings = feat.geometry && feat.geometry.rings;
    if (!rings || rings.length === 0) continue;
    const sqm = calcRingsArea(rings);
    if (sqm > 0 && sqm < bestSqM) bestSqM = sqm;
  }
  if (!isFinite(bestSqM) || bestSqM <= 0) return null;
  return Math.round(bestSqM * 10.7639);
}

// ─── USGS 3DEP Elevation Point Query (NAVD88, 1m lidar where available) ───
const USGS_EPQS_URL = "https://epqs.nationalmap.gov/v1/json";

async function fetchUSGSElevation(lng, lat) {
  const params = new URLSearchParams({
    x: String(lng),
    y: String(lat),
    wkid: "4326",
    units: "Feet",
    includeDate: "false",
  });
  const r = await fetch(`${USGS_EPQS_URL}?${params}`);
  if (!r.ok) throw new Error(`USGS HTTP ${r.status}`);
  const data = await r.json();
  // EPQS v1 returns { value: <number> } or { value: -1000000 } for ocean/void
  const elev = parseFloat(data.value);
  if (!isFinite(elev) || elev < -1000) return null;
  return Math.round(elev * 100) / 100; // 2 decimal places, in feet NAVD88
}

// ─── Cost Estimator (OLS regression on local building stock) ───
// Uses all buildings in the current location with known gross area and
// structure value to fit: structureValue = slope × grossArea + intercept
// Then predicts for the target building. Content = structure / 2.
// Minimum 5 reference points required; falls back to median $/sqft otherwise.

function estimateCostRegression(footprintArea, stories, allSurveys, allBuildings) {
  const fp = parseFloat(footprintArea) || 0;
  const s = Math.max(1, Math.round(parseFloat(stories) || 1));
  const grossTarget = fp * s;
  if (grossTarget <= 0) return null;

  // Collect reference data: buildings with known area, stories, and structure value
  const refs = [];
  allBuildings.forEach(b => {
    const sv = allSurveys[b.uid];
    const pf = b.prefill || {};
    const d = sv || pf;
    const area = parseFloat(d.area || pf.area);
    const st = parseFloat(d.numStories || pf.numStories);
    const val = parseFloat(d.structureValue || pf.structureValue);
    if (isFinite(area) && area > 0 && isFinite(st) && st >= 1 && isFinite(val) && val > 0) {
      refs.push({ gross: area * Math.round(st), val });
    }
  });

  if (refs.length < 2) return null;

  // OLS: y = slope * x + intercept
  const n = refs.length;
  let sx = 0, sy = 0, sxy = 0, sxx = 0;
  for (const r of refs) { sx += r.gross; sy += r.val; sxy += r.gross * r.val; sxx += r.gross * r.gross; }
  const denom = n * sxx - sx * sx;

  let sv, method;
  if (Math.abs(denom) < 1e-10 || n < 5) {
    // Fallback: median $/sqft (fewer than 5 refs or degenerate data)
    const psfs = refs.map(r => r.val / r.gross).sort((a,b) => a - b);
    const medPsf = psfs[Math.floor(psfs.length / 2)];
    sv = Math.round(grossTarget * medPsf);
    method = "median";
  } else {
    const slope = (n * sxy - sx * sy) / denom;
    const intercept = (sy - slope * sx) / n;
    sv = Math.round(slope * grossTarget + intercept);
    method = "OLS";
    // Sanity: if regression gives negative or implausibly low, use median
    if (sv < grossTarget * 10) {
      const psfs = refs.map(r => r.val / r.gross).sort((a,b) => a - b);
      sv = Math.round(grossTarget * psfs[Math.floor(psfs.length / 2)]);
      method = "median";
    }
  }

  return { structure: sv, content: Math.round(sv / 2), refCount: n, method };
}

function applyDevEdits(base, edits) {
  let list = base.filter(b => !edits.removed.includes(b.uid));
  list = list.map(b => {
    if (edits.moved[b.uid]) return { ...b, lat: edits.moved[b.uid].lat, lng: edits.moved[b.uid].lng };
    return b;
  });
  edits.added.forEach(a => list.push(a));
  return list;
}

// Shared helper: build buildings array from sheet data, skipping invalid coords
function sheetDataToBuildings(sheetData) {
  return Object.entries(sheetData)
    .map(([uid, s]) => {
      const lng = parseFloat(s.longitude);
      const lat = parseFloat(s.latitude);
      if (!isFinite(lng) || !isFinite(lat) || (lng === 0 && lat === 0)) return null;
      return {
        uid,
        type: s.survey_type || (uid.startsWith("nsi-") ? "verify" : "survey"),
        nsiId: s.ID || "",
        lng, lat,
        prefill: {
          occType: s.occType || "", buildingType: s.buildingType || "",
          numStories: s.numStories || "", area: s.area || "",
          foundationType: s.foundationType || "", firstFloorHeight: s.firstFloorHeight || "",
          yearBuilt: s.yearBuilt || "", groundElev: s.groundElev || "",
          address: s.address || "",
          structureValue: s.structureValue || "", contentValue: s.contentValue || "",
          basement: s.basement || "", notes: s.notes || "", surveyor: s.surveyor || "",
        },
      };
    })
    .filter(Boolean);
}

// Shared helper: load and merge dev edits from local + remote
async function loadDevEdits(location) {
  let best = { removed: [], moved: {}, added: [], _ts: 0 };
  // Check localStorage
  try {
    const raw = localStorage.getItem("nsi-dev-edits-" + location);
    if (raw) {
      const local = JSON.parse(raw);
      if (!local.removed) local.removed = [];
      if (!local.moved) local.moved = {};
      if (!local.added) local.added = [];
      if (!local._ts) local._ts = 1;
      best = local;
    }
  } catch {}
  // Check remote
  try {
    const remote = await fetchDevEdits(location);
    if (remote) {
      if (!remote.removed) remote.removed = [];
      if (!remote.moved) remote.moved = {};
      if (!remote.added) remote.added = [];
      if (!remote._ts) remote._ts = 0;
      if (remote._ts > best._ts) best = remote;
    }
  } catch {}
  return best;
}

function App() {
  const mapRef = useRef(null);
  const mapInst = useRef(null);
  const markersRef = useRef({});

  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const mrkR = isMobile ? 10 : 7;
  const mrkRv = isMobile ? 9 : 6;
  const mrkRsel = isMobile ? 14 : 10;

  const [curLoc, setCurLoc] = useState("shinnecock");
  const curLocRef = useRef(curLoc);

  const switchLocation = useCallback(async (newLoc) => {
    if (newLoc === curLocRef.current) return;
    curLocRef.current = newLoc;
    setCurLoc(newLoc);
    setSelected(null);
    setForm(EMPTY_FORM);
    setLoading(true);
    setDevAction(null);

    try {
      const result = await fetchSurveys(newLoc);
      const sheetData = (!result.error && result.data) ? result.data : {};
      const sheetBuildings = sheetDataToBuildings(sheetData);
      baseBuildingsRef.current = sheetBuildings;
      setSurveys(sheetData);

      // Always restore dev edits (may have added points even if sheet is empty)
      const best = await loadDevEdits(newLoc);
      devEditsRef.current = best;
      setDevEdits(best);
      setBuildings(applyDevEdits(sheetBuildings, best));
      saveLocalDev(best);
    } catch {
      baseBuildingsRef.current = [];
      setSurveys({});
      // Still try to load dev edits (may have added points)
      try {
        const best = await loadDevEdits(newLoc);
        devEditsRef.current = best;
        setDevEdits(best);
        setBuildings(applyDevEdits([], best));
        saveLocalDev(best);
      } catch { setBuildings([]); }
    }

    // Move map
    const loc = LOCATIONS[newLoc];
    if (mapInst.current) mapInst.current.setView(loc.center, loc.zoom, { animate: true });

    setLoading(false);
  }, []);

  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState(EMPTY_FORM);
  const [surveys, setSurveys] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [filter, setFilter] = useState("all");
  const [devMode, setDevMode] = useState(false);
  const [devAction, setDevAction] = useState(null); // "move" | "add" | null
  const [devEdits, setDevEdits] = useState({ removed: [], moved: {}, added: [] });
  const [devDirty, setDevDirty] = useState(false);
  const [devSyncing, setDevSyncing] = useState(false);
  const [buildings, setBuildings] = useState([]);
  const baseBuildingsRef = useRef([]);
  const devEditsRef = useRef(devEdits);
  const debounceTimerRef = useRef(null);

  // Helper: update ref + state + buildings + localStorage synchronously, then auto-save to server
  const commitDevEdits = useCallback((next) => {
    // Add timestamp for conflict resolution
    next._ts = Date.now();
    devEditsRef.current = next;
    setDevEdits(next);
    setBuildings(applyDevEdits(baseBuildingsRef.current, next));
    saveLocalDev(next);
    setDevDirty(true);
    // Auto-save to server with 3s debounce
    if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
    debounceTimerRef.current = setTimeout(async () => {
      savingRef.current = true;
      try {
        const cur = devEditsRef.current;
        const curBuildings = applyDevEdits(baseBuildingsRef.current, cur);
        await saveDevEditsRemote(cur, curLocRef.current);
        // Delete removed survey rows
        for (const uid of (cur.removed||[])) {
          await deleteSurveyEntry(uid, curLocRef.current);
        }
        // Update moved points' coordinates
        for (const uid in (cur.moved||{})) {
          const b = curBuildings.find(x => x.uid === uid);
          if (!b) continue;
          const s = surveysRef.current[uid] || (b.prefill ? {...b.prefill} : null);
          if (s) {
            await saveSurveyEntry(uid, b.type, b.nsiId, b.lng, b.lat, {...s, savedAt: s.savedAt || ""}, curLocRef.current);
          }
        }
        setDevDirty(false);
      } catch (err) {
        console.error("Dev auto-save failed:", err);
        if (typeof window.__showToast === "function") window.__showToast("Dev sync failed: " + err.message, "error");
      } finally {
        savingRef.current = false;
      }
    }, 3000);
  }, []);

  // Warn before leaving with unsaved dev edits
  useEffect(() => {
    const handler = (e) => {
      if (devDirty) { e.preventDefault(); e.returnValue = ""; }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [devDirty]);

  // Listen for localStorage changes from other tabs
  useEffect(() => {
    const handler = (e) => {
      if (e.key === ("nsi-dev-edits-" + curLocRef.current) && e.newValue) {
        try {
          const other = JSON.parse(e.newValue);
          const mine = devEditsRef.current;
          // Only accept if newer timestamp
          if ((other._ts || 0) > (mine._ts || 0)) {
            devEditsRef.current = other;
            setDevEdits(other);
            setBuildings(applyDevEdits(baseBuildingsRef.current, other));
          }
        } catch {}
      }
    };
    window.addEventListener("storage", handler);
    return () => window.removeEventListener("storage", handler);
  }, []);
  const savingRef = useRef(false);
  const surveysRef = useRef(surveys);
  useEffect(() => { surveysRef.current = surveys; }, [surveys]);

  // Dev edits: localStorage helper
  function saveLocalDev(d) {
    try { localStorage.setItem("nsi-dev-edits-" + curLocRef.current, JSON.stringify(d)); } catch(e) {}
  }

  const refreshSurveys = useCallback(async () => {
    if (savingRef.current) return;
    const result = await fetchSurveys(curLocRef.current);
    if (savingRef.current) return;
    if (result.error) { console.warn("Survey refresh failed:", result.error); return; }
    const sheetData = result.data || {};
    setSurveys(sheetData);
    // Always rebuild buildings from sheet (even if empty — clears stale data)
    const freshBuildings = sheetDataToBuildings(sheetData);
    baseBuildingsRef.current = freshBuildings;
    // Always refresh remote dev edits (adopt if newer)
    try {
      const remote = await fetchDevEdits(curLocRef.current);
      if (remote && (remote._ts || 0) > (devEditsRef.current._ts || 0)) {
        if (!remote.removed) remote.removed = [];
        if (!remote.moved) remote.moved = {};
        if (!remote.added) remote.added = [];
        devEditsRef.current = remote;
        setDevEdits(remote);
        saveLocalDev(remote);
      }
    } catch {}
    setBuildings(applyDevEdits(freshBuildings, devEditsRef.current));
  }, []);

  useEffect(() => {
    // Auto-pull from Google Sheet on startup
    const initFromSheet = async () => {
      try {
        const result = await fetchSurveys(curLocRef.current);
        if (result.error) {
          console.error("Initial load failed:", result.error);
          setTimeout(() => {
            if (typeof window.__showToast === "function") window.__showToast("⚠ Failed to load from Google Sheet: " + result.error, "error");
          }, 500);
          setLoading(false);
          return;
        }

        const sheetData = result.data || {};
        const sheetBuildings = sheetDataToBuildings(sheetData);
        baseBuildingsRef.current = sheetBuildings;
        setSurveys(sheetData);

        // Always restore dev edits (may contain added points even if sheet is empty)
        const best = await loadDevEdits(curLocRef.current);
        devEditsRef.current = best;
        setDevEdits(best);
        setBuildings(applyDevEdits(sheetBuildings, best));
        saveLocalDev(best);
      } catch (err) {
        console.error("Init failed:", err);
      }
      setLoading(false);
    };
    initFromSheet();
    // Poll surveys every 30s
    const interval = setInterval(refreshSurveys, 30000);
    return () => clearInterval(interval);
  }, []);

  const showToast = useCallback((msg, type="success") => {
    setToast({msg,type}); setTimeout(() => setToast(null), 3000);
  }, []);
  useEffect(() => { window.__showToast = showToast; return () => { delete window.__showToast; }; }, [showToast]);

  useEffect(() => {
    if (mapInst.current || !mapRef.current) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
    document.head.appendChild(link);
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
    script.onload = () => {
      const L = window.L;
      const map = L.map(mapRef.current, { zoomControl: false }).setView([40.877, -72.431], 14);
      L.control.zoom({ position: "topright" }).addTo(map);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OSM", maxZoom: 19,
      }).addTo(map);
      mapInst.current = map;

      map.on("click", (e) => {
        if (window.__devAction === "move" && window.__devSelected) {
          window.__devMove(e.latlng.lat, e.latlng.lng);
        } else if (window.__devAction === "add") {
          window.__devAdd(e.latlng.lat, e.latlng.lng);
        }
      });
    };
    document.head.appendChild(script);
  }, []);

  // Sync markers with buildings state
  useEffect(() => {
    if (!mapInst.current || !window.L) return;
    const L = window.L;
    // Remove old markers
    Object.values(markersRef.current).forEach(m => m.remove());
    markersRef.current = {};
    // Create fresh
    buildings.forEach(b => {
      const isV = b.type === "verify";
      const m = L.circleMarker([b.lat, b.lng], {
        radius: isV ? mrkRv : mrkR,
        fillColor: isV ? "#3b82f6" : "#ef4444",
        color: "#fff", weight: 1.5, fillOpacity: 0.85,
      }).addTo(mapInst.current);
      m.on("click", () => window.__sel(b.uid));
      markersRef.current[b.uid] = m;
    });
  }, [buildings]);

  const selRingRef = useRef(null);

  // Update markers style
  useEffect(() => {
    // Remove old selection ring
    if (selRingRef.current) { selRingRef.current.remove(); selRingRef.current = null; }

    buildings.forEach(b => {
      const m = markersRef.current[b.uid];
      if (!m) return;
      const done = !!(surveys[b.uid] && surveys[b.uid].savedAt);
      const isV = b.type === "verify";
      let show = true;
      if (filter === "survey") show = !isV;
      else if (filter === "verify") show = isV;
      else if (filter === "done") show = done;
      else if (filter === "pending") show = !done;

      m.setStyle({
        fillColor: done ? "#22c55e" : isV ? "#3b82f6" : "#ef4444",
        color: "#fff",
        weight: 1.5,
        opacity: show ? 1 : 0.08,
        fillOpacity: show ? 0.85 : 0.05,
        radius: show ? (isV ? mrkRv : mrkR) : 3,
      });
    });

    // Draw selection ring around selected point
    if (selected && mapInst.current && window.L) {
      const b = buildings.find(x => x.uid === selected);
      if (b) {
        selRingRef.current = window.L.circleMarker([b.lat, b.lng], {
          radius: isMobile ? 20 : 16,
          fillColor: "transparent",
          fillOpacity: 0,
          color: "#fbbf24",
          weight: 3,
          opacity: 0.9,
        }).addTo(mapInst.current);
      }
    }
  }, [surveys, filter, buildings, selected, devMode]);

  useEffect(() => {
    window.__sel = (uid) => {
      if (window.__devAction) return; // don't select during dev actions
      const b = buildings.find(x => x.uid === uid);
      if (!b) return;
      setSelected(uid);
      const existing = surveys[uid];
      if (existing) setForm({...EMPTY_FORM, ...existing});
      else if (b.prefill) setForm({...EMPTY_FORM, ...b.prefill});
      else setForm(EMPTY_FORM);
      if (mapInst.current) mapInst.current.panTo([b.lat, b.lng], {animate: true});
    };
    return () => { delete window.__sel; };
  }, [surveys, buildings]);

  // Dev mode handlers exposed to map click
  useEffect(() => {
    window.__devAction = devAction;
    window.__devSelected = selected;
  }, [devAction, selected]);

  useEffect(() => {
    window.__devMove = (lat, lng) => {
      if (!selected) return;
      const cur = devEditsRef.current;
      const next = { ...cur, moved: { ...cur.moved, [selected]: { lat, lng } } };
      commitDevEdits(next);
      setDevAction(null);
      showToast("Point moved — auto-saving...");
    };
    window.__devAdd = (lat, lng) => {
      const cur = devEditsRef.current;
      // Find next available ID >= 10001
      let maxNewId = 10000;
      buildings.forEach(b => {
        const id = parseInt(b.nsiId || (b.uid.startsWith("new-") ? b.uid.replace("new-","") : "0"));
        if (id >= 10000 && id > maxNewId) maxNewId = id;
      });
      (cur.added||[]).forEach(a => {
        const id = parseInt(a.nsiId || "0");
        if (id >= 10000 && id > maxNewId) maxNewId = id;
      });
      const newId = maxNewId + 1;
      const uid = "new-" + newId;
      const newPt = { uid, type: "survey", nsiId: String(newId), lng, lat, prefill: null };
      const next = { ...cur, added: [...(cur.added||[]), newPt] };
      commitDevEdits(next);
      setDevAction(null);
      showToast("Point #" + newId + " added — auto-saving...");
    };
    return () => { delete window.__devMove; delete window.__devAdd; };
  }, [selected, showToast, commitDevEdits]);

  const devRemove = () => {
    if (!selected) return;
    const cur = devEditsRef.current;
    const newMoved = { ...cur.moved };
    delete newMoved[selected];
    const next = {
      removed: [...(cur.removed||[]), selected],
      moved: newMoved,
      added: (cur.added||[]).filter(a => a.uid !== selected),
    };
    commitDevEdits(next);
    setSurveys(prev => { const u = {...prev}; delete u[selected]; return u; });
    setSelected(null); setForm(EMPTY_FORM);
    showToast("Point removed — auto-saving...", "info");
  };

  const devResetAll = async () => {
    if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
    savingRef.current = true;
    try {
      const fresh = { removed: [], moved: {}, added: [], _ts: Date.now() };
      devEditsRef.current = fresh;
      setDevEdits(fresh);
      setBuildings(applyDevEdits(baseBuildingsRef.current, fresh));
      saveLocalDev(fresh);
      setSelected(null); setForm(EMPTY_FORM);
      await saveDevEditsRemote(fresh, curLocRef.current);
      setDevDirty(false);
      showToast("All dev edits reset & synced", "info");
    } catch (err) {
      showToast("Reset failed: " + err.message, "error");
    } finally {
      savingRef.current = false;
    }
  };

  const devSyncToServer = async () => {
    if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
    savingRef.current = true;
    setDevSyncing(true);
    try {
      const cur = devEditsRef.current;
      const curBuildings = applyDevEdits(baseBuildingsRef.current, cur);
      await saveDevEditsRemote(cur, curLocRef.current);
      for (const uid of (cur.removed||[])) {
        await deleteSurveyEntry(uid, curLocRef.current);
      }
      for (const uid in (cur.moved||{})) {
        const b = curBuildings.find(x => x.uid === uid);
        if (!b) continue;
        const s = surveysRef.current[uid] || (b.prefill ? {...b.prefill} : null);
        if (s) {
          await saveSurveyEntry(uid, b.type, b.nsiId, b.lng, b.lat, {...s, savedAt: s.savedAt || ""}, curLocRef.current);
        }
      }
      setDevDirty(false);
      showToast("Dev edits synced to Google Sheet!");
    } catch (err) {
      showToast("Dev sync failed: " + err.message, "error");
    } finally {
      setDevSyncing(false);
      savingRef.current = false;
    }
  };

  const handleSave = async () => {
    if (!form.numStories || !form.occType || !form.foundationType) {
      showToast("Stories, foundation type, and occupancy type required", "error"); return;
    }
    savingRef.current = true;
    setSaving(true);
    const b = buildings.find(x => x.uid === selected);
    const basement = form.foundationType === "B" ? "Yes" : "No";
    const entry = {...form, basement, savedAt: new Date().toISOString()};
    try {
      await saveSurveyEntry(selected, b.type, b.nsiId, b.lng, b.lat, entry, curLocRef.current);
      setSurveys(prev => ({...prev, [selected]: entry}));
      showToast("Saved & synced!");
    } catch (err) {
      showToast("Save failed: " + err.message, "error");
      console.error("Save error:", err);
    } finally {
      setSaving(false);
      savingRef.current = false;
    }
  };

  const handleUndoSave = async () => {
    if (selected == null) return;
    savingRef.current = true;
    try {
      const b = buildings.find(x => x.uid === selected);
      const pf = b?.prefill || {};
      // Reset to prefill data with empty savedAt/surveyor/notes
      const resetEntry = {
        occType: pf.occType || "", buildingType: pf.buildingType || "",
        numStories: pf.numStories || "", area: pf.area || "",
        foundationType: pf.foundationType || "", firstFloorHeight: pf.firstFloorHeight || "",
        yearBuilt: pf.yearBuilt || "", groundElev: pf.groundElev || "",
        address: pf.address || "",
        structureValue: pf.structureValue || "", contentValue: pf.contentValue || "",
        basement: pf.basement || "", notes: "", surveyor: "", savedAt: "",
      };
      // Update the sheet row (keep building in sheet but clear the survey)
      await saveSurveyEntry(selected, b.type, b.nsiId, b.lng, b.lat, resetEntry, curLocRef.current);
      setSurveys(prev => ({...prev, [selected]: resetEntry}));
      setForm({...EMPTY_FORM, ...resetEntry});
      showToast("Survey undone — point reset", "info");
    } catch (err) {
      showToast("Undo failed: " + err.message, "error");
    } finally {
      savingRef.current = false;
    }
  };

  const navigateToBuilding = () => {
    if (!selected) return;
    const b = buildings.find(x => x.uid === selected);
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${b.lat},${b.lng}&travelmode=driving`, "_blank");
  };

  const goToNearest = () => {
    if (!navigator.geolocation) { showToast("No geolocation", "error"); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      const {latitude, longitude} = pos.coords;
      let minD = Infinity, near = null;
      buildings.forEach(b => {
        if (surveys[b.uid] && surveys[b.uid].savedAt) return;
        const d = Math.sqrt((b.lat-latitude)**2 + (b.lng-longitude)**2);
        if (d < minD) { minD = d; near = b.uid; }
      });
      if (near) window.__sel(near);
    }, () => showToast("Location denied", "error"));
  };

  const exportCSV = () => {
    if (buildings.length === 0) { showToast("No buildings to export", "error"); return; }
    const esc = v => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`;
    let csv = "ID,occupancy_type,building_type,number_of_stories,area,foundation_type,foundation_height,year_built,ground_elevation,address,longitude,latitude,structure_value,content_value\r\n";
    buildings.forEach(b => {
      const saved = surveys[b.uid];
      const pf = b.prefill || {};
      const s = saved || pf;
      csv += [
        esc(b.nsiId || ""),
        esc(s.occType || ""), esc(s.buildingType || ""), esc(s.numStories || ""), esc(s.area || ""),
        esc(s.foundationType || ""), esc(s.firstFloorHeight || ""), esc(s.yearBuilt || ""), esc(s.groundElev || ""),
        esc(s.address || ""), esc(b.lng), esc(b.lat),
        esc(s.structureValue || ""), esc(s.contentValue || "")
      ].join(",") + "\r\n";
    });
    const locName = LOCATIONS[curLocRef.current].name.replace(/\s+/g, "_");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = locName + "_NSI.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast("CSV exported — " + buildings.length + " buildings");
  };

  const [sheetSyncing, setSheetSyncing] = useState(false);
  const syncAllToSheet = async () => {
    if (buildings.length === 0) { showToast("No buildings to sync", "error"); return; }
    const sc = buildings.filter(b => surveys[b.uid] && surveys[b.uid].savedAt).length;
    const uc = buildings.length - sc;
    if (!confirm("Push " + buildings.length + " buildings to Sheet:\n• " + sc + " surveyed\n• " + uc + " unsurveyed (will have partial data)\n\nContinue?")) return;
    setSheetSyncing(true);
    try {
      const rows = buildings.map(b => {
        const saved = surveys[b.uid];
        const pf = b.prefill || {};
        const s = saved || pf;
        return {
          uid: b.uid,
          survey_type: b.type,
          ID: String(b.nsiId || ""),
          occupancy_type: s.occType || "",
          building_type: s.buildingType || "",
          number_of_stories: s.numStories || "",
          area: s.area || "",
          foundation_type: s.foundationType || "",
          foundation_height: s.firstFloorHeight || "",
          year_built: s.yearBuilt || "",
          ground_elevation: s.groundElev || "",
          address: s.address || "",
          longitude: String(b.lng),
          latitude: String(b.lat),
          structure_value: s.structureValue || "",
          content_value: s.contentValue || "",
          basement: s.basement || "",
          notes: s.notes || "",
          surveyor: s.surveyor || "",
          savedAt: s.savedAt || "",
        };
      });
      const resp = await postJson({ action: "bulkSave", rows, location: curLocRef.current });
      if (resp.error) throw new Error(resp.error);
      const surveyedCount = buildings.filter(b => surveys[b.uid] && surveys[b.uid].savedAt).length;
      showToast("Sheet synced — " + buildings.length + " buildings (" + surveyedCount + " surveyed) pushed!");
    } catch (err) {
      showToast("Sync failed: " + err.message, "error");
    } finally {
      setSheetSyncing(false);
    }
  };

  const [pulling, setPulling] = useState(false);
  const [fetchingArea, setFetchingArea] = useState(false);
  const autoFetchArea = async () => {
    if (!selected) return;
    const b = buildings.find(x => x.uid === selected);
    if (!b) return;
    setFetchingArea(true);
    try {
      const sqft = await fetchBuildingFootprintArea(b.lng, b.lat);
      if (sqft !== null) {
        setForm(f => ({...f, area: String(sqft)}));
        showToast("Area fetched: " + sqft.toLocaleString() + " sqft");
      } else {
        showToast("No building footprint found at this location", "error");
      }
    } catch (err) {
      showToast("Footprint fetch failed: " + err.message, "error");
    } finally {
      setFetchingArea(false);
    }
  };

  const autoEstimateCost = () => {
    if (!form.area || !form.numStories) {
      showToast("Need footprint area and stories first", "error"); return;
    }
    const result = estimateCostRegression(form.area, form.numStories, surveys, buildings);
    if (result) {
      setForm(f => ({...f, structureValue: String(result.structure), contentValue: String(result.content)}));
      showToast(result.method === "OLS"
        ? "OLS estimate from " + result.refCount + " buildings: $" + result.structure.toLocaleString()
        : "Median $/sqft from " + result.refCount + " buildings: $" + result.structure.toLocaleString()
      );
    } else {
      showToast("Not enough reference data — need at least 2 buildings with known area and value in this location", "error");
    }
  };

  const [fetchingElev, setFetchingElev] = useState(false);
  const autoFetchElevation = async () => {
    if (!selected) return;
    const b = buildings.find(x => x.uid === selected);
    if (!b) return;
    setFetchingElev(true);
    try {
      const elev = await fetchUSGSElevation(b.lng, b.lat);
      if (elev !== null) {
        setForm(f => ({...f, groundElev: String(elev)}));
        showToast("Elevation: " + elev + " ft (NAVD88) from USGS 3DEP");
      } else {
        showToast("No elevation data at this location", "error");
      }
    } catch (err) {
      showToast("Elevation fetch failed: " + err.message, "error");
    } finally {
      setFetchingElev(false);
    }
  };

  const pullFromSheet = async () => {
    if (!confirm("⚠️ This will overwrite all local data for \"" + LOCATIONS[curLocRef.current].name + "\" with what's in the Google Sheet.\n\nAny local points or changes not in the Sheet will be lost.\n\nContinue?")) return;
    setPulling(true);
    setSelected(null);
    setForm(EMPTY_FORM);
    try {
      // Pull surveys — this is the single source of truth
      const result = await fetchSurveys(curLocRef.current);
      if (result.error) throw new Error(result.error);
      const sheetData = result.data || {};

      // Build buildings list entirely from sheet rows
      const sheetBuildings = sheetDataToBuildings(sheetData);

      // Clear dev edits — sheet is now the truth
      const freshDevEdits = { removed: [], moved: {}, added: [], _ts: Date.now() };
      devEditsRef.current = freshDevEdits;
      setDevEdits(freshDevEdits);
      saveLocalDev(freshDevEdits);
      await saveDevEditsRemote(freshDevEdits, curLocRef.current);

      baseBuildingsRef.current = sheetBuildings;
      setBuildings(sheetBuildings);
      setSurveys(sheetData);

      showToast("Pulled " + sheetBuildings.length + " buildings from Sheet!");
    } catch (err) {
      showToast("Pull failed: " + err.message, "error");
    } finally {
      setPulling(false);
    }
  };

  const verifyCount = buildings.filter(b => b.type==="verify").length;
  const surveyCount = buildings.filter(b => b.type==="survey").length;
  const doneCount = buildings.filter(b => surveys[b.uid] && surveys[b.uid].savedAt).length;
  const pct = buildings.length ? Math.round((doneCount / buildings.length) * 100) : 0;
  const todoCount = buildings.filter(b => !(surveys[b.uid] && surveys[b.uid].savedAt)).length;
  const selB = selected ? buildings.find(x => x.uid === selected) : null;
  // Filter-aware UIDs for Prev/Next navigation
  const filteredUids = buildings.filter(b => {
    const done = !!(surveys[b.uid] && surveys[b.uid].savedAt);
    const isV = b.type === "verify";
    if (filter === "survey") return !isV;
    if (filter === "verify") return isV;
    if (filter === "done") return done;
    if (filter === "pending") return !done;
    return true;
  }).map(b => b.uid);
  const devEditCount = devEdits.removed.length + Object.keys(devEdits.moved).length + devEdits.added.length;

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#0f172a",color:"#e2e8f0"}}>
      {toast && (
        <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:10000,
          padding:"10px 24px",borderRadius:8,
          background:toast.type==="error"?"#dc2626":toast.type==="info"?"#2563eb":"#16a34a",
          color:"#fff",fontWeight:600,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>{toast.msg}</div>
      )}

      <div style={{width:400,minWidth:400,display:"flex",flexDirection:"column",borderRight:"1px solid #1e293b",background:"#0f172a",overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid #1e293b",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🏗</div>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:"#f8fafc"}}>NSI Field Survey Tool</div>
              <div style={{fontSize:11,color:"#64748b"}}>{LOCATIONS[curLoc].name} — {buildings.length} buildings</div>
            </div>
            <button onClick={()=>{setDevMode(d=>!d);setDevAction(null);}} title="Developer Mode" style={{
              padding:"4px 8px",borderRadius:6,border:devMode?"2px solid #f59e0b":"1px solid #334155",cursor:"pointer",
              background:devMode?"#422006":"#1e293b",color:devMode?"#fbbf24":"#64748b",fontSize:11,fontWeight:700,
            }}>⚙ DEV</button>
          </div>

          <div style={{marginBottom:8}}>
            <select value={curLoc} onChange={e => switchLocation(e.target.value)} style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #334155",background:"#1e293b",color:"#e2e8f0",fontSize:13,fontWeight:600,cursor:"pointer",appearance:"auto"}}>
              {Object.entries(LOCATIONS).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
            </select>
          </div>

          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#94a3b8",marginBottom:4}}>
            <span>{doneCount} / {buildings.length} complete</span>
            <span style={{fontWeight:600,color:pct===100?"#22c55e":"#f59e0b"}}>{pct}%</span>
          </div>
          <div style={{height:5,borderRadius:3,background:"#1e293b"}}>
            <div style={{height:5,borderRadius:3,background:pct===100?"#22c55e":"linear-gradient(90deg,#3b82f6,#8b5cf6)",width:`${pct}%`,transition:"width .4s"}}/>
          </div>

          <div style={{display:"flex",gap:12,marginTop:8,fontSize:11,color:"#94a3b8"}}>
            <span><span style={{display:"inline-block",width:9,height:9,borderRadius:"50%",background:"#ef4444",marginRight:4,verticalAlign:"middle"}}/>New ({surveyCount})</span>
            <span><span style={{display:"inline-block",width:9,height:9,borderRadius:"50%",background:"#3b82f6",marginRight:4,verticalAlign:"middle"}}/>Verify ({verifyCount})</span>
            <span><span style={{display:"inline-block",width:9,height:9,borderRadius:"50%",background:"#22c55e",marginRight:4,verticalAlign:"middle"}}/>Done ({doneCount})</span>
          </div>

          <div style={{display:"flex",gap:4,marginTop:8}}>
            {[["all","All",buildings.length],["survey","New",surveyCount],["verify","Verify",verifyCount],["done","Done",doneCount],["pending","Todo",todoCount]].map(([k,l,n])=>(
              <button key={k} onClick={()=>setFilter(k)} style={{
                flex:1,padding:"4px 0",borderRadius:5,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,
                background:filter===k?"#3b82f6":"#1e293b",color:filter===k?"#fff":"#94a3b8",
              }}>{l} ({n})</button>
            ))}
          </div>

          <div style={{display:"flex",gap:5,marginTop:8}}>
            <button onClick={goToNearest} style={abtn("#0f766e")}>📍 Nearest</button>
            <button onClick={exportCSV} style={abtn("#7c3aed")}>📥 CSV</button>
            <button onClick={()=>window.open(SHEET_URL,"_blank")} style={abtn("#0369a1")}>📊 Raw Data</button>
            <button onClick={()=>window.open(README_URL,"_blank")} style={abtn("#475569")}>📖 README</button>
          </div>
          <div style={{display:"flex",gap:5,marginTop:5}}>
            <button onClick={pullFromSheet} disabled={pulling} style={abtn("#1d4ed8")}>{pulling ? "⏳..." : "⬇ Pull Sheet"}</button>
            <button onClick={syncAllToSheet} disabled={sheetSyncing} style={abtn("#b45309")}>{sheetSyncing ? "⏳..." : "☁️ Sync Sheet"}</button>
          </div>

          {/* Developer Mode Panel */}
          {devMode && (
            <div style={{marginTop:10,padding:"10px 12px",borderRadius:8,background:"#1c1917",border:"1px solid #422006"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>⚙ Developer Mode</div>

              <div style={{display:"flex",gap:5,marginBottom:8}}>
                <button onClick={()=>setDevAction(devAction==="add"?null:"add")} style={{
                  flex:1,padding:"6px",borderRadius:6,border:devAction==="add"?"2px solid #22c55e":"1px solid #334155",
                  cursor:"pointer",background:devAction==="add"?"#14532d":"#1e293b",
                  color:devAction==="add"?"#4ade80":"#94a3b8",fontWeight:600,fontSize:11,
                }}>{devAction==="add"?"🟢 Click Map...":"➕ Add Point"}</button>
                <button onClick={()=>{
                  if (!selected) { showToast("Select a point first","error"); return; }
                  setDevAction(devAction==="move"?null:"move");
                }} style={{
                  flex:1,padding:"6px",borderRadius:6,border:devAction==="move"?"2px solid #3b82f6":"1px solid #334155",
                  cursor:"pointer",background:devAction==="move"?"#1e3a5f":"#1e293b",
                  color:devAction==="move"?"#60a5fa":"#94a3b8",fontWeight:600,fontSize:11,
                }}>{devAction==="move"?"🔵 Click Map...":"✥ Move Point"}</button>
              </div>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>{
                  if (!selected) { showToast("Select a point first","error"); return; }
                  if (confirm("Remove this building point?")) devRemove();
                }} style={{flex:1,padding:"6px",borderRadius:6,border:"1px solid #7f1d1d",cursor:"pointer",background:"#1e293b",color:"#f87171",fontWeight:600,fontSize:11}}>
                  🗑 Remove Point
                </button>
                {devEditCount > 0 && (
                  <button onClick={()=>{ if (confirm("Clear all dev edits (moves, adds, removes) and sync the reset to the server?\n\nNote: Already-synced deletions cannot be restored. Use Pull Sheet to reload from the Sheet.")) devResetAll(); }} style={{
                    flex:1,padding:"6px",borderRadius:6,border:"1px solid #334155",cursor:"pointer",background:"#1e293b",color:"#f59e0b",fontWeight:600,fontSize:11,
                  }}>↩ Clear Edits ({devEditCount})</button>
                )}
              </div>
              {devDirty && (
                <button onClick={devSyncToServer} disabled={devSyncing} style={{
                  width:"100%",marginTop:6,padding:"8px",borderRadius:6,border:"none",
                  cursor:devSyncing?"wait":"pointer",
                  background:devSyncing?"#334155":"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontWeight:700,fontSize:12,
                }}>{devSyncing ? "⏳ Syncing..." : "☁️ Sync Now (auto-saves in 3s)"}</button>
              )}
              {!devDirty && devEditCount > 0 && (
                <div style={{marginTop:6,fontSize:10,color:"#4ade80",textAlign:"center"}}>✓ All dev edits synced</div>
              )}
              {selected && selB && (
                <div style={{marginTop:6,fontSize:10,color:"#a8a29e",lineHeight:1.4}}>
                  Selected: <b style={{color:"#fbbf24"}}>{selB.uid}</b> at {selB.lat.toFixed(6)}, {selB.lng.toFixed(6)}
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{flex:1,overflow:"auto",padding:"14px 18px"}}>
          {buildings.length === 0 && !loading ? (
            <div style={{textAlign:"center",marginTop:50,color:"#475569"}}>
              <div style={{fontSize:44,marginBottom:10}}>☁️</div>
              <div style={{fontSize:14,fontWeight:600,color:"#94a3b8"}}>No data loaded for {LOCATIONS[curLoc].name}</div>
              <div style={{fontSize:12,marginTop:6,marginBottom:16}}>Pull building data from Google Sheet to get started</div>
              <button onClick={pullFromSheet} disabled={pulling} style={{padding:"10px 24px",borderRadius:8,border:"none",cursor:"pointer",background:"#1d4ed8",color:"#fff",fontWeight:700,fontSize:14}}>
                {pulling ? "⏳ Pulling..." : "⬇ Pull from Sheet"}
              </button>
            </div>
          ) : !selected ? (
            <div style={{textAlign:"center",marginTop:50,color:"#475569"}}>
              <div style={{fontSize:44,marginBottom:10}}>📍</div>
              <div style={{fontSize:14,fontWeight:600}}>Select a building on the map</div>
              <div style={{fontSize:12,marginTop:6}}>Click any marker to begin</div>
            </div>
          ) : (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:"#f8fafc"}}>
                    ID: {selB.nsiId || selB.uid}
                    <span style={{marginLeft:8,fontSize:10,padding:"2px 8px",borderRadius:4,
                      background:selB.type==="verify"?"#1e3a5f":"#3b1219",
                      color:selB.type==="verify"?"#60a5fa":"#fca5a5"
                    }}>{selB.type==="verify"?"VERIFY":"NEW SURVEY"}</span>
                    {surveys[selected] && surveys[selected].savedAt && <span style={{marginLeft:6,fontSize:10,padding:"2px 8px",borderRadius:4,background:"#166534",color:"#4ade80"}}>SAVED</span>}
                  </div>
                  <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{selB.lat.toFixed(6)}, {selB.lng.toFixed(6)}</div>
                </div>
                <button onClick={()=>{setSelected(null);setForm(EMPTY_FORM);}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:18}}>✕</button>
              </div>

              <div style={{display:"flex",gap:6,marginBottom:12}}>
                <button onClick={navigateToBuilding} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",background:"#1d4ed8",color:"#fff",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  🧭 Navigate
                </button>
                <button onClick={()=>{if(!selected)return;const b=buildings.find(x=>x.uid===selected);window.open(`https://earth.google.com/web/@${b.lat},${b.lng},50a,200d,35y,0h,60t,0r`,"_blank");}} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",background:"#0369a1",color:"#fff",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  🌍 3D View
                </button>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <FLD label="Surveyor">
                  <input value={form.surveyor} onChange={e=>setForm(f=>({...f,surveyor:e.target.value}))} placeholder="Your name" style={inp}/>
                </FLD>
                <FLD label="Address">
                  <input value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} placeholder="Street address" style={inp}/>
                </FLD>
                <div style={{display:"flex",gap:8}}>
                  <FLD label="Stories *" s={{flex:1}}>
                    <input type="number" min="1" max="99" value={form.numStories} onChange={e=>setForm(f=>({...f,numStories:e.target.value}))} style={inp}/>
                  </FLD>
                  <FLD label="1st Floor Ht (ft)" s={{flex:1}}>
                    <input type="number" min="0" max="30" step="0.5" value={form.firstFloorHeight} onChange={e=>setForm(f=>({...f,firstFloorHeight:e.target.value}))} style={inp}/>
                  </FLD>
                </div>
                <FLD label="Foundation Type *">
                  <select value={form.foundationType} onChange={e=>setForm(f=>({...f,foundationType:e.target.value}))} style={{...inp,appearance:"auto"}}>
                    <option value="">— Select —</option>
                    <option value="S">S — Slab on Grade</option>
                    <option value="C">C — Crawlspace</option>
                    <option value="B">B — Basement</option>
                    <option value="P">P — Pier/Pile</option>
                    <option value="W">W — Solid Wall</option>
                    <option value="U">U — Unknown</option>
                  </select>
                </FLD>
                <FLD label="Occupancy Type *">
                  <select value={form.occType} onChange={e=>setForm(f=>({...f,occType:e.target.value}))} style={{...inp,appearance:"auto"}}>
                    <option value="">— Select —</option>
                    <optgroup label="Residential">
                      {OCC_TYPES.filter(o=>o.code.startsWith("RES")).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                    </optgroup>
                    <optgroup label="Commercial">
                      {OCC_TYPES.filter(o=>o.code.startsWith("COM")).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                    </optgroup>
                    <optgroup label="Industrial">
                      {OCC_TYPES.filter(o=>o.code.startsWith("IND")).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                    </optgroup>
                    <optgroup label="Other">
                      {OCC_TYPES.filter(o=>!/^(RES|COM|IND)/.test(o.code)).map(o=><option key={o.code} value={o.code}>{o.label}</option>)}
                    </optgroup>
                  </select>
                </FLD>
                <div style={{display:"flex",gap:8}}>
                  <FLD label="Bldg Type" s={{flex:1}}>
                    <select value={form.buildingType} onChange={e=>setForm(f=>({...f,buildingType:e.target.value}))} style={{...inp,appearance:"auto"}}>
                      <option value="">—</option>
                      <option value="W">W — Wood</option>
                      <option value="M">M — Masonry</option>
                      <option value="C">C — Concrete</option>
                      <option value="S">S — Steel</option>
                      <option value="H">H — Manufactured</option>
                    </select>
                  </FLD>
                  <FLD label="Footprint (sqft)" s={{flex:1}}>
                    <div style={{display:"flex",gap:4}}>
                      <input type="number" value={form.area} onChange={e=>setForm(f=>({...f,area:e.target.value}))} style={{...inp,flex:1}}/>
                      <button onClick={autoFetchArea} disabled={fetchingArea} title="Auto-detect from Microsoft Building Footprints" style={{padding:"6px 10px",borderRadius:7,border:"1px solid #334155",cursor:fetchingArea?"wait":"pointer",background:fetchingArea?"#334155":"#1e3a5f",color:"#60a5fa",fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{fetchingArea ? "⏳" : "🏠 Auto"}</button>
                    </div>
                  </FLD>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <FLD label="Year Built" s={{flex:1}}>
                    <input type="number" value={form.yearBuilt} onChange={e=>setForm(f=>({...f,yearBuilt:e.target.value}))} style={inp}/>
                  </FLD>
                  <FLD label="Ground Elev (ft, NAVD88)" s={{flex:1}}>
                    <div style={{display:"flex",gap:4}}>
                      <input type="number" step="0.01" value={form.groundElev} onChange={e=>setForm(f=>({...f,groundElev:e.target.value}))} style={{...inp,flex:1}}/>
                      <button onClick={autoFetchElevation} disabled={fetchingElev} title="Auto-fetch from USGS 3DEP (1m lidar)" style={{padding:"6px 10px",borderRadius:7,border:"1px solid #334155",cursor:fetchingElev?"wait":"pointer",background:fetchingElev?"#334155":"#1e3a5f",color:"#60a5fa",fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{fetchingElev ? "⏳" : "📐 Auto"}</button>
                    </div>
                  </FLD>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                  <FLD label="Structure Value ($)" s={{flex:1}}>
                    <input type="number" value={form.structureValue} onChange={e=>setForm(f=>({...f,structureValue:e.target.value}))} style={inp}/>
                  </FLD>
                  <FLD label="Content Value ($)" s={{flex:1}}>
                    <input type="number" value={form.contentValue} onChange={e=>setForm(f=>({...f,contentValue:e.target.value}))} style={inp}/>
                  </FLD>
                  <button onClick={autoEstimateCost} title="Auto-estimate via OLS regression on local building stock" style={{padding:"8px 10px",borderRadius:7,border:"1px solid #334155",cursor:"pointer",background:"#1e3a5f",color:"#60a5fa",fontWeight:700,fontSize:11,whiteSpace:"nowrap",marginBottom:0}}>💰 Auto</button>
                </div>
                <FLD label="Notes">
                  <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Observations..." rows={2} style={{...inp,resize:"vertical"}}/>
                </FLD>
              </div>

              <div style={{display:"flex",gap:8,marginTop:14}}>
                <button onClick={handleSave} disabled={saving} style={{
                  flex:1,padding:"11px",borderRadius:9,border:"none",cursor:saving?"wait":"pointer",
                  background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontWeight:700,fontSize:13,
                }}>{saving?"Saving...":"💾 Save"}</button>
                {surveys[selected] && surveys[selected].savedAt && <button onClick={handleUndoSave} style={{padding:"11px 14px",borderRadius:9,border:"1px solid #7f1d1d",cursor:"pointer",background:"#1e293b",color:"#f87171",fontWeight:600,fontSize:13}}>↩ Undo Save</button>}
              </div>

              <div style={{display:"flex",gap:8,marginTop:8,paddingBottom:20}}>
                <button onClick={()=>{const i=filteredUids.indexOf(selected);const p=i>0?i-1:filteredUids.length-1;window.__sel(filteredUids[p]);}} style={abtn("#334155")}>← Prev</button>
                <button onClick={()=>{const i=filteredUids.indexOf(selected);const n=i<filteredUids.length-1?i+1:0;window.__sel(filteredUids[n]);}} style={abtn("#334155")}>Next →</button>
              </div>
            </div>
          )}
        </div>
      </div>

      <div style={{flex:1,position:"relative"}}>
        <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
        {devAction && (
          <div style={{
            position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",zIndex:1000,
            padding:"8px 20px",borderRadius:8,
            background:devAction==="add"?"rgba(22,101,52,.9)":"rgba(30,58,138,.9)",
            color:"#fff",fontWeight:600,fontSize:13,boxShadow:"0 4px 16px rgba(0,0,0,.4)",
            display:"flex",alignItems:"center",gap:10,
          }}>
            {devAction==="add" ? "➕ Click map to place new point" : "✥ Click map to move selected point"}
            <button onClick={()=>setDevAction(null)} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontWeight:700}}>Cancel</button>
          </div>
        )}
        {loading && (
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,.8)",zIndex:1000}}>
            <div style={{color:"#94a3b8",textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:8,animation:"pulse 1.5s infinite"}}>☁️</div>
              <div style={{fontSize:14,fontWeight:600}}>Loading from Google Sheet...</div>
            </div>
          </div>
        )}
      </div>

      <style>{`
        .leaflet-container { background: #0f172a !important; }
        ${devAction ? '.leaflet-container { cursor: crosshair !important; }' : ''}
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
      `}</style>
    </div>
  );
}

function FLD({label,children,s}) {
  return <div style={s}><label style={{display:"block",fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>{label}</label>{children}</div>;
}

const inp = {width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #334155",background:"#1e293b",color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box"};

function abtn(bg) {
  return {flex:1,padding:"6px 0",borderRadius:6,border:"none",cursor:"pointer",background:bg,color:"#e2e8f0",fontWeight:600,fontSize:11,textAlign:"center"};
}


  

function PasswordGate({ onUnlock }) {
  const [pw, setPw] = React.useState("");
  const [error, setError] = React.useState(false);

  React.useEffect(() => {
    const saved = sessionStorage.getItem("nsi-auth");
    if (saved === "ok") onUnlock();
  }, []);

  const handleSubmit = () => {
    if (pw === atob("TlkyMDI2VkE=")) {
      sessionStorage.setItem("nsi-auth", "ok");
      onUnlock();
    } else {
      setError(true);
      setTimeout(() => setError(false), 2000);
    }
  };

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0f172a",fontFamily:"'Segoe UI',system-ui,sans-serif",padding:20}}>
      <div style={{maxWidth:400,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🔒</div>
        <h1 style={{color:"#f8fafc",fontSize:20,fontWeight:700,margin:"0 0 4px"}}>NSI Field Survey Tool</h1>
        <p style={{color:"#64748b",fontSize:13,marginBottom:24}}>Enter password to continue</p>
        <div style={{display:"flex",gap:8}}>
          <input type="password" value={pw}
            onChange={e=>{setPw(e.target.value);setError(false);}}
            onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
            placeholder="Password" autoFocus
            style={{flex:1,padding:"12px 16px",borderRadius:8,border:error?"2px solid #dc2626":"1px solid #334155",background:"#1e293b",color:"#e2e8f0",fontSize:15,outline:"none",boxSizing:"border-box"}}
          />
          <button onClick={handleSubmit} style={{padding:"12px 24px",borderRadius:8,border:"none",cursor:"pointer",background:"#3b82f6",color:"#fff",fontWeight:700,fontSize:14}}>Go</button>
        </div>
        {error && <div style={{marginTop:10,color:"#f87171",fontSize:13,fontWeight:600}}>Incorrect password</div>}
      </div>
    </div>
  );
}

function Root() {
  const [authed, setAuthed] = React.useState(false);
  if (!authed) return <PasswordGate onUnlock={() => setAuthed(true)} />;
  return <App />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);

  </script>
</body>
</html>
